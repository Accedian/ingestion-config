[[inputs.kafka_consumer]]
  version = "2.1.0"
  brokers = ["redpanda:9092"]
  topics = ["edr-access-endpoint"]
  consumer_group = "pcaue" # Consumer group ID
  client_id = "pcaue-consumer"
  data_format = "json" # Input data format
  name_override = "edr-access-endpoint"
  json_string_fields = [
    "@timestamp",
    "AccessAggregationAlias",
    "AccessAggregationId",
    "AccessBandwidth",
    "AccessEndpoint",
    "AccessEndpointAlias",
    "AccessType",
    "AverageSimultaneousActiveSubscriberCount",
    "Azimuth",
    "BurstRate",
    "BurstRateSampleCount",
    "BurstRateStdDev",
    "BurstRateStdDevSampleCount",
    "BurstWidth",
    "BurstWidthSampleCount",
    "CongestionRatio",
    "ConsumptionRate",
    "ConsumptionRateSampleCount",
    "Country",
    "CxSampleCount",
    "CxScore",
    "DownlinkVolume",
    "FlowCount",
    "InterBurstGap",
    "InterBurstGapSampleCount",
    "InterBurstGapStdDev",
    "InterBurstGapStdDevSampleCount",
    "IntervalDuration",
    "IsCoverageLayer",
    "Location",
    "MedianSimultaneousActiveSubscriberCount",
    "OpangaSpeedTest",
    "OpangaSpeedTestSampleCount",
    "Region",
    "RetransmissionPercent",
    "RetransmissionPercentSampleCount",
    "SectorId",
    "SiteId",
    "StartTime",
    "SubscriberBecomeActiveCount",
    "SufficientThroughputPercent",
    "SufficientThroughputPercentSampleCount",
    "TcpRtt",
    "TcpRttSampleCount",
    "TcpRttStdDev",
    "TcpRttStdDevSampleCount",
    "TimeTo500KBytes",
    "TimeTo500KBytesSampleCount",
    "TrafficProcessor",
    "UplinkVolume",
  ]


[[processors.defaults]]
order = 1
  namepass = ["edr-access-endpoint"]
  [processors.defaults.fields]
    "@timestamp" = "0"
    AccessAggregationAlias = ""
    AccessAggregationId = "\\N"
    AccessBandwidth = "\\N"
    AccessEndpoint = ""  # this is going to the ClickHouse PKEY
    AccessEndpointAlias = "\\N"
    AccessType = "\\N"
    AverageSimultaneousActiveSubscriberCount = "\\N"
    Azimuth = "\\N"
    BurstRate = "\\N"
    BurstRateSampleCount = "\\N"
    BurstRateStdDev = "\\N"
    BurstRateStdDevSampleCount = "\\N"
    BurstWidth = "\\N"
    BurstWidthSampleCount = "\\N"
    CongestionRatio = "\\N"
    ConsumptionRate = "\\N"
    ConsumptionRateSampleCount = "\\N"
    Country = "\\N"
    CxSampleCount = "\\N"
    CxScore = "\\N"
    DownlinkVolume = "\\N"
    FlowCount = "\\N"
    InterBurstGap = "\\N"
    InterBurstGapSampleCount = "\\N"
    InterBurstGapStdDev = "\\N"
    InterBurstGapStdDevSampleCount = "\\N"
    IntervalDuration = "\\N"
    IsCoverageLayer = "\\N"
    Location = "\\N"
    MedianSimultaneousActiveSubscriberCount = "\\N"
    OpangaSpeedTest = "\\N"
    OpangaSpeedTestSampleCount = "\\N"
    Region = "\\N"
    RetransmissionPercent = "\\N"
    RetransmissionPercentSampleCount = "\\N"
    SectorId = "\\N"
    SiteId = ""
    StartTime = "\\N"
    SubscriberBecomeActiveCount = "\\N"
    SufficientThroughputPercent = "\\N"
    SufficientThroughputPercentSampleCount = "\\N"
    TcpRtt = "\\N"
    TcpRttSampleCount = "\\N"
    TcpRttStdDev = "\\N"
    TcpRttStdDevSampleCount = "\\N"
    TimeTo500KBytes = "\\N"
    TimeTo500KBytesSampleCount = "\\N"
    TrafficProcessor = "\\N"
    UplinkVolume = "\\N"


# Convert fields to types
[[processors.converter]]
order = 2
  namepass = ["edr-access-endpoint"]
  [processors.converter.fields]
  order = 2
    tag = ["AccessAggregationAlias", "SiteId", "AccessEndpoint"]
    integer = []
    unsigned = []
    boolean = []
    float = []

[[processors.rename]]
order = 3
  namepass = ["edr-access-endpoint"]
  [[processors.rename.replace]]
    field = "@timestamp"
    dest = "record_timestamp"

  [[processors.rename.replace]]
    field = "OpangaSpeedTest"
    dest = "CiscoUESpeedTest"

  [[processors.rename.replace]]
    field = "OpangaSpeedTestSampleCount"
    dest = "CiscoUESpeedTestSampleCount"

# Template Section for constructing object ID for node environmentals
[[processors.template]]
order = 4
  namepass = ["edr-access-endpoint"]
  tag = "sessionName"
  template = '{{ .Tag "AccessAggregationAlias" }}_{{ .Tag "SiteId" }}_{{ .Tag "AccessEndpoint" }}_CiscoUE-edr-access-endpoint'

[[processors.template]]
order = 4
  namepass = ["edr-access-endpoint"]
  tag = "sessionId"
  template = '{{ .Tag "AccessAggregationAlias" }}_{{ .Tag "SiteId" }}_{{ .Tag "AccessEndpoint" }}_CiscoUE-edr-access-endpoint'

[[processors.template]]
order = 4
  namepass = ["edr-access-endpoint"]
  tag = "objectType"
  template = 'CiscoUE-edr-access-endpoint'

[[processors.template]]
order = 4
  namepass = ["edr-access-endpoint"]
  tag = "direction"
  template = '2'
