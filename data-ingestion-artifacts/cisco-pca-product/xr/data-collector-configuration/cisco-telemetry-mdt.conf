  tag = "objectType"
  template = 'cisco-telemetry-xr-ipsla-udp-jitter'

[[processors.template]]
  order = 4
  namepass = ["ipsla_echo*"]
  tag = "objectType"
  template = 'cisco-telemetry-xr-ipsla-icmp-echo'

[[processors.template]]
  order = 4
  namepass = ["ipsla*"]
  tag = "direction"
  template = "-1"

