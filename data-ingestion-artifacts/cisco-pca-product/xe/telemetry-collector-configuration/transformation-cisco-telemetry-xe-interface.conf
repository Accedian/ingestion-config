# XE IF Stats

[[processors.template]]
order = 1
  namepass = ["xe_if_stats"]
  tag = "sessionId"
   template = '{{ .Tag "source" }}_{{ .Tag "name" }}'

[[processors.template]]
order = 1
  namepass = ["xe_if_stats"]
  tag = "sessionName"
   template = '{{ .Tag "source" }}_{{ .Tag "name" }}'


[[processors.template]]
order = 2
  namepass = ["xe_if_stats*"]
  tag = "objectType"
  template = 'cisco-telemetry-xe-interface'

[[processors.template]]
order = 3
  namepass = ["xe_if_stats*"]
  tag = "direction"
  template = '0'


[[processors.tag_limit]]
order = 4
  namepass = ["xe_if_stats*"]
