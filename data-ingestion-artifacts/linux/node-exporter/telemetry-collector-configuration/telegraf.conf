# [agent]
#   interval = "60s"
#   flush_interval = "20s"
#   debug = true
#   omit_hostname = true

[[inputs.prometheus]]
  urls = ["http://node-exporter:9100/metrics"]
  interval = "60s"


  [[processors.template]]
    order = 1
    namepass = ["node*"]
    tag = "direction"
    template = "-1"

  [[processors.template]]
    order = 2
    namepass = ["node_cpu*"]
    tag = "objectType"
    template = "node-exporter-cpu"
  [[processors.template]]
    order = 2
    namepass = ["node_cpu*"]
    tag = "sessionName"
    template = 'host-{{ .Tag "host" }}_cpu-{{ .Tag "cpu" }}_node-exporter-cpu'
  [[processors.template]]
    order = 2
    namepass = ["node_cpu*"]
    tag = "sessionId"
    template = 'host-{{ .Tag "host" }}_cpu-{{ .Tag "cpu" }}_node-exporter-cpu'

  [[processors.template]]
    order = 2
    namepass = ["node_disk*"]
    tag = "objectType"
    template = "node-exporter-disk"
  [[processors.template]]
    order = 2
    namepass = ["node_disk*"]
    tag = "sessionName"
    template = 'host-{{ .Tag "host" }}_device-{{ .Tag "device" }}_node-exporter-disk'
  [[processors.template]]
    order = 2
    namepass = ["node_disk*"]
    tag = "sessionId"
    template = 'host-{{ .Tag "host" }}_device-{{ .Tag "device" }}_node-exporter-disk'

  [[processors.template]]
    order = 2
    namepass = ["node_filesystem*"]
    tag = "objectType"
    template = "node-exporter-filesystem"
  [[processors.template]]
    order = 2
    namepass = ["node_filesystem*"]
    tag = "sessionName"
    template = 'host-{{ .Tag "host" }}_device-{{ .Tag "device" }}_node-exporter-filesystem'
  [[processors.template]]
    order = 2
    namepass = ["node_filesystem*"]
    tag = "sessionId"
    template = 'host-{{ .Tag "host" }}_device-{{ .Tag "device" }}_node-exporter-filesystem'

  [[processors.template]]
    order = 2
    namepass = ["node_memory*"]
    tag = "objectType"
    template = "node-exporter-memory"
  [[processors.template]]
    order = 2
    namepass = ["node_memory*"]
    tag = "sessionName"
    template = 'host-{{ .Tag "host" }}_node-exporter-memory'
  [[processors.template]]
    order = 2
    namepass = ["node_memory*"]
    tag = "sessionId"
    template = 'host-{{ .Tag "host" }}_node-exporter-memory'


  [[processors.template]]
    order = 2
    namepass = ["node_netstat*"]
    tag = "objectType"
    template = "node-exporter-netstat"
  [[processors.template]]
    order = 2
    namepass = ["node_netstat*"]
    tag = "sessionName"
    template = 'host-{{ .Tag "host" }}_node-exporter-netstat'
  [[processors.template]]
    order = 2
    namepass = ["node_netstat*"]
    tag = "sessionId"
    template = 'host-{{ .Tag "host" }}_node-exporter-netstat'


  [[processors.template]]
    order = 2
    namepass = ["node_network*"]
    tag = "objectType"
    template = "node-exporter-network"
  [[processors.template]]
    order = 2
    namepass = ["node_network*"]
    tag = "sessionName"
    template = 'host-{{ .Tag "host" }}_device-{{ .Tag "device" }}_node-exporter-network'
  [[processors.template]]
    order = 2
    namepass = ["node_network*"]
    tag = "sessionId"
    template = 'host-{{ .Tag "host" }}_device-{{ .Tag "device" }}_node-exporter-network'


  [[processors.starlark]]
  ## 1) filters out any metric missing the objectType label, we dont accept those anyway. 
  ## 2) removes the leading node_xyz part of each metric name because we already encoded 
  ## this information into the objectType so no need to repeat it.  
    order = 3
    namepass = ["node_*"]

    source = '''
def apply(metric):

    if "objectType" not in metric.tags:
        # If the "objectType" tag is missing, drop the metric by returning None
        return None

    parts = metric.name.split("_")
    if len(parts) >= 2: # Ensure there are at least two words to remove
        metric.name = "_".join(parts[2:]) # Join parts from the third word onwards

    return metric
'''


[[processors.tag_limit]]
order = 4
  #fieldinclude = ["*"]
  ## Maximum number of tags to preserve
  limit = 8

  ## List of tags to preferentially preserve
  keep = ["sessionId", "sessionName", "objectType", "direction"]


