[agent]
  interval = "60s"
  flush_interval = "50s"
  # debug = true
  quiet = false

[[inputs.jti_openconfig_telemetry]]
    servers = ["192.168.21.33:32767"]
    sample_frequency = "60000ms"
    username = "__DEVICE_USERNAME__"
    password = "__DEVICE_PASSWORD__"
    client_id = "cisco-pca"
    sensors = [
    "/junos/system/linecard/cpu/memory",
    "/junos/system/linecard/interface/",
    "/junos/system/linecard/environment",
    ]
    collection_jitter = "0s"
    flush_interval = "15s"
    flush_jitter = "0s"

# ============================================================================
# RENAME METRICS FOR CLARITY
# ============================================================================
# Rename interface metrics
[[processors.rename]]
  order = 1
  [[processors.rename.replace]]
    measurement = "/junos/system/linecard/interface/"
    dest = "juniper_interface"
  [[processors.rename.replace]]
    measurement = "/junos/system/linecard/interface/logical/usage"
    dest = "juniper_subinterface"
  [[processors.rename.replace]]
    measurement = "/junos/system/linecard/environment"
    dest = "juniper_environment"
  [[processors.rename.replace]]
    measurement = "/junos/system/linecard/packet/usage/"
    dest = "juniper_packet"
  [[processors.rename.replace]]
    measurement = "/junos/system/linecard/cpu/memory"
    dest = "juniper_cpu_memory"
  [[processors.rename.replace]]
    measurement = "/junos/system/linecard/optics/"
    dest = "juniper_optics"

# ============================================================================
# CLEAN UP FIELD NAMES AND EXTRACT TAGS
# ============================================================================
[[processors.starlark]]
  order = 2
  source = '''
def apply(metric):
    # Extract interface name from tag and create clean interface_name tag
    iface_name = metric.tags.get("/interfaces/interface/@name", "")
    if iface_name:
        metric.tags["interface_name"] = iface_name
    
    # Extract linecard/component name
    linecard_name = metric.tags.get("/junos/system/linecard/@name", "")
    if linecard_name:
        metric.tags["linecard"] = linecard_name
    
    component_name = metric.tags.get("/components/component/@name", "")
    if component_name:
        metric.tags["component"] = component_name
    
    # Extract temp/voltage sensor names for environment metrics
    temp_sensor = metric.tags.get("/junos/system/linecard/environment/temp-record/@temp-sensor-name", "")
    if temp_sensor:
        metric.tags["sensor_name"] = temp_sensor
        metric.tags["sensor_type"] = "temperature"
    
    voltage_sensor = metric.tags.get("/junos/system/linecard/environment/voltage-record/@voltage-sensor-name", "")
    if voltage_sensor:
        metric.tags["sensor_name"] = voltage_sensor
        metric.tags["sensor_type"] = "voltage"
    
    # Extract CPU/memory component and CPU names
    cpu_component = metric.tags.get("/system-process/component/@name", "")
    if cpu_component:
        metric.tags["component"] = cpu_component
    
    # Get cpu_name for field renaming but don't keep it as a tag
    cpu_name_raw = metric.tags.get("/system-process/cpu-usage/@cpuName", "")
    cpu_name = ""
    if cpu_name_raw != "":
        cpu_name = str(cpu_name_raw)
    
    # Remove verbose original tags after extracting clean values
    tags_to_remove = [
        "/interfaces/interface/@name",
        "/interfaces/interface/subinterfaces/subinterface/@index",
        "/junos/system/linecard/@name",
        "/components/component/@name",
        "/junos/system/linecard/environment/temp-record/@temp-sensor-name",
        "/junos/system/linecard/environment/voltage-record/@voltage-sensor-name",
        "/system-process/component/@name",
        "/system-process/cpu-usage/@cpuName",
    ]
    for tag_key in tags_to_remove:
        metric.tags.pop(tag_key, None)
    
    # Clean up interface field names - create short, clean names
    new_fields = {}
    fields_to_delete = []
    
    for field_key, field_val in metric.fields.items():
        new_key = field_key
        
        # Interface counters - simplify names
        if "/interfaces/interface/state/counters/" in field_key:
            # Extract just the counter name (e.g., "in-pkts", "out-octets")
            new_key = field_key.split("/")[-1]
            fields_to_delete.append(field_key)
            new_fields[new_key] = field_val
        
        # Interface state fields
        elif "/interfaces/interface/state/" in field_key:
            new_key = field_key.replace("/interfaces/interface/state/", "")
            if new_key != field_key:
                fields_to_delete.append(field_key)
                new_fields[new_key] = field_val
        
        # Interface base fields
        elif "/interfaces/interface/" in field_key:
            new_key = field_key.replace("/interfaces/interface/", "")
            if new_key != field_key:
                fields_to_delete.append(field_key)
                new_fields[new_key] = field_val
        
        # Environment fields - voltage (include sensor name in field)
        elif "/junos/system/linecard/environment/voltage-record/" in field_key:
            base_key = field_key.split("/")[-1]
            # Skip redundant sensor name field (already in tag)
            if base_key == "voltage-sensor-name":
                fields_to_delete.append(field_key)
            else:
                # Get sensor name and create field like voltage-value_VDD1V2
                v_sensor = metric.tags.get("sensor_name", "")
                if v_sensor != "" and base_key == "voltage-value":
                    new_key = base_key + "_" + v_sensor.replace(" ", "_")
                else:
                    new_key = base_key
                fields_to_delete.append(field_key)
                new_fields[new_key] = field_val
        
        # Environment fields - temperature (include sensor name in field)
        elif "/junos/system/linecard/environment/temp-record/" in field_key:
            base_key = field_key.split("/")[-1]
            # Skip redundant sensor name field (already in tag)
            if base_key == "temp-sensor-name":
                fields_to_delete.append(field_key)
            else:
                # Get sensor name and create field like temp-value_VDD3V3_Temp
                t_sensor = metric.tags.get("sensor_name", "")
                if t_sensor != "" and base_key == "temp-value":
                    new_key = base_key + "_" + t_sensor.replace(" ", "_")
                else:
                    new_key = base_key
                fields_to_delete.append(field_key)
                new_fields[new_key] = field_val
        
        # Environment fields - power records
        elif "/junos/system/linecard/environment/power-record/" in field_key:
            new_key = field_key.split("/")[-1]
            fields_to_delete.append(field_key)
            new_fields[new_key] = field_val
        
        # Component/packet fields
        elif "/components/component/properties/property/" in field_key:
            new_key = field_key.split("/")[-1]
            if new_key == "value":
                new_key = "metric_value"
            fields_to_delete.append(field_key)
            new_fields[new_key] = field_val
        
        # CPU/memory fields - clean up verbose names and rename cpuUsage to cpu{N}_usage
        elif "/system-process/" in field_key:
            new_key = field_key.split("/")[-1]
            # Skip redundant name fields already extracted as tags
            if new_key in ["name", "cpuName"]:
                fields_to_delete.append(field_key)
            elif new_key == "cpuUsage":
                # Use local cpu_name variable to create cpu{N}_usage field name
                if cpu_name != "":
                    new_key = "cpu" + cpu_name + "_usage"
                fields_to_delete.append(field_key)
                new_fields[new_key] = field_val
            else:
                fields_to_delete.append(field_key)
                new_fields[new_key] = field_val
    
    # Apply field changes
    for key in fields_to_delete:
        metric.fields.pop(key, None)
    
    for key, val in new_fields.items():
        metric.fields[key] = val
    
    # -------------------------------------------------------------------
    # FILTER: Drop metrics that only have queue-number or no useful data
    # -------------------------------------------------------------------
    # For interface metrics, check if we have actual counter data
    meas_name = metric.name
    if meas_name in ["juniper_interface", "juniper_subinterface", "juniper_interface_stats"]:
        field_keys = list(metric.fields.keys())
        
        # Define fields that indicate useful counter data
        useful_counters = ["in-pkts", "out-pkts", "in-octets", "out-octets", 
                          "in-errors", "out-errors", "in-discards", "out-discards",
                          "in-broadcast-pkts", "out-broadcast-pkts",
                          "in-multicast-pkts", "out-multicast-pkts",
                          "in-unicast-pkts", "out-unicast-pkts",
                          "carrier-transitions", "last-clear"]
        
        has_useful_counter = False
        for key in field_keys:
            if key in useful_counters:
                has_useful_counter = True
                break
        
        # If the only field is queue-number or no useful counters, drop the metric
        if not has_useful_counter:
            return None
    
    # -------------------------------------------------------------------
    # For CPU/memory metrics, only keep those with CPU usage fields
    # -------------------------------------------------------------------
    if meas_name == "juniper_cpu_memory":
        field_keys = list(metric.fields.keys())
        has_cpu_usage = False
        for key in field_keys:
            if key.startswith("cpu") and key.endswith("_usage"):
                has_cpu_usage = True
                break
        if not has_cpu_usage:
            return None
    
    # -------------------------------------------------------------------
    # For environment metrics, build sessionId/sessionName based on FPC only
    # All sensors per FPC will be merged into single metric
    # -------------------------------------------------------------------
    if meas_name == "juniper_environment":
        system_id = metric.tags.get("system_id", "")
        linecard = metric.tags.get("linecard", "")
        
        # Build session based on FPC only (sensors will be merged)
        if linecard != "":
            session_name = system_id + "_" + linecard 
        else:
            session_name = system_id
        
        # Both sessionId and sessionName are the same (no spaces in FPC names)
        metric.tags["sessionName"] = session_name
        metric.tags["sessionId"] = session_name
        
        # Remove sensor_name and sensor_type tags (now encoded in field names)
        metric.tags.pop("sensor_name", None)
        metric.tags.pop("sensor_type", None)
    
    # -------------------------------------------------------------------
    # Add direction tag to all metrics
    # -------------------------------------------------------------------
    metric.tags["direction"] = "0"

    return metric
'''

# ============================================================================
# ADD CONTEXT TAGS FOR INTERFACES
# ============================================================================
[[processors.template]]
  order = 3
  namepass = ["juniper_interface", "juniper_subinterface"]
  tag = "sessionId"
  template = '{{ .Tag "system_id" }}_{{ .Tag "interface_name" }}'

[[processors.template]]
  order = 4
  namepass = ["juniper_interface", "juniper_subinterface"]
  tag = "sessionName"
  template = '{{ .Tag "system_id" }}_{{ .Tag "interface_name" }}'

[[processors.template]]
  order = 5
  namepass = ["juniper_interface", "juniper_subinterface"]
  tag = "objectType"
  template = 'juniper-telemetry-interface'

# ============================================================================
# ADD CONTEXT TAGS FOR ENVIRONMENT
# ============================================================================
# sessionId and sessionName are now set in Starlark processor
[[processors.template]]
  order = 7
  namepass = ["juniper_environment"]
  tag = "objectType"
  template = 'juniper-telemetry-environment'

# ============================================================================
# ADD CONTEXT TAGS FOR PACKET/CPU METRICS
# ============================================================================
[[processors.template]]
  order = 9
  namepass = ["juniper_packet"]
  tag = "sessionId"
  template = '{{ .Tag "system_id" }}_{{ .Tag "component" }}'

[[processors.template]]
  order = 10
  namepass = ["juniper_packet"]
  tag = "sessionName"
  template = '{{ .Tag "system_id" }}_{{ .Tag "component" }}'

[[processors.template]]
  order = 11
  namepass = ["juniper_packet", "juniper_cpu_memory"]
  tag = "objectType"
  template = 'juniper-telemetry-system'

[[processors.template]]
  order = 12
  namepass = ["juniper_cpu_memory"]
  tag = "sessionId"
  template = '{{ .Tag "system_id" }}_Cpu'

[[processors.template]]
  order = 13
  namepass = ["juniper_cpu_memory"]
  tag = "sessionName"
  template = '{{ .Tag "system_id" }}_Cpu'

# ============================================================================
# ADD CONTEXT TAGS FOR OPTICS
# ============================================================================
[[processors.template]]
  order = 14
  namepass = ["juniper_optics"]
  tag = "sessionId"
  template = '{{ .Tag "system_id" }}_{{ .Tag "interface_name" }}'

[[processors.template]]
  order = 15
  namepass = ["juniper_optics"]
  tag = "sessionName"
  template = '{{ .Tag "system_id" }}_{{ .Tag "interface_name" }}'

[[processors.template]]
  order = 16
  namepass = ["juniper_optics"]
  tag = "objectType"
  template = 'juniper-telemetry-optics'

# ============================================================================
# AGGREGATE CPU METRICS INTO SINGLE METRIC WITH ALL CPU FIELDS
# ============================================================================
[[aggregators.merge]]
  namepass = ["juniper_cpu_memory"]
  drop_original = true
  period = "60s"
  grace = "10s"

# ============================================================================
# AGGREGATE ENVIRONMENT METRICS INTO SINGLE METRIC PER FPC
# ============================================================================
[[aggregators.merge]]
  namepass = ["juniper_environment"]
  drop_original = true
  period = "60s"
  grace = "10s"

[[outputs.file]]
  files = ["/capture/transformed.jsonl"]
  data_format = "json"
