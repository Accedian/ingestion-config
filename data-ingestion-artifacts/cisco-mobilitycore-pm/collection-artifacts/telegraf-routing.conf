#######################
# Cisco PCA Fault and Mobility PM Ingestion pipeline config
# METRIC ROUTING IMPLEMENTATION (namepass/namedrop)
# 
# This implementation uses separate processor blocks with namepass
# filters to route metrics to different object types based on KPI names.
# Each new rule requires 3 additional processor blocks.
#
# MME Schema Split (127 KPIs total → 5 objectTypes):
#   mme-inter: 23 KPIs (MME_Inter_*)
#   mme-intra: 20 KPIs (MME_Intra_*)
#   mme-emm:   22 KPIs (EMM_*, EPS_*, Intra_MME_*, UE_*, S1_Paging*)
#   mme-pdn:   28 KPIs (MME_PDN_*, MME_DCNR_*)
#   mme:       34 KPIs (remaining - base objectType)
#######################

[[inputs.kafka_consumer]]
  interval = "60s"
  brokers = ["{{server_ip}}:9092"]
  topics = ["pca_kpi_topic"]
  offset = "oldest"
  max_message_len = 1000000
  data_format = "json"
  json_query = "@this"
  json_name_key = "kpi"
  json_time_key = "timestamp"
  json_time_format = "unix"
  tag_keys = ["device", "kpi","index","node_id","schema", "source_ip", "node_ip"]

# Processor: Use regex to clean the "index" tag and remove the square brackets
[[processors.regex]]
  order = 3
  namedrop = ["internal_*"]
  [[processors.regex.tags]]
    key = "index"
    pattern = '^\["(.*?)"\]$'
    replacement = '${1}'

# Processor: to clean the "index" tag and remove the unsupported comma chars
[[processors.strings]]
  order = 4
  [[processors.strings.replace]]
    tag = "index"
    old = ","
    new = "_"

#######################
# GROUP 1: MME Inter metrics (23 KPIs) → mme-inter
#######################

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["MME_Inter_*"]
  tag = "objectType"
  template = 'cisco-mobilitycore-pm-{{ .Tag "schema" }}-inter'
  [processors.template.tagpass]
  schema = ["mme"]

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["MME_Inter_*"]
  tag = "sessionName"
  template = '{{ .Tag "device" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}-inter'
  [processors.template.tagpass]
  schema = ["mme"]

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["MME_Inter_*"]
  tag = "sessionId"
  template = '{{ .Tag "node_id" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}-inter'
  [processors.template.tagpass]
  schema = ["mme"]

#######################
# GROUP 2: MME Intra metrics (20 KPIs) → mme-intra
#######################

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["MME_Intra_*"]
  tag = "objectType"
  template = 'cisco-mobilitycore-pm-{{ .Tag "schema" }}-intra'
  [processors.template.tagpass]
  schema = ["mme"]

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["MME_Intra_*"]
  tag = "sessionName"
  template = '{{ .Tag "device" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}-intra'
  [processors.template.tagpass]
  schema = ["mme"]

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["MME_Intra_*"]
  tag = "sessionId"
  template = '{{ .Tag "node_id" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}-intra'
  [processors.template.tagpass]
  schema = ["mme"]

#######################
# GROUP 3: EMM/EPS metrics (22 KPIs) → mme-emm
# Includes: EMM_*, EPS_*, Intra_MME_*, UE_*, S1_Paging*
#######################

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["EMM_*", "EPS_*", "Intra_MME_*", "UE_*", "S1_Paging*"]
  tag = "objectType"
  template = 'cisco-mobilitycore-pm-{{ .Tag "schema" }}-emm'
  [processors.template.tagpass]
  schema = ["mme"]

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["EMM_*", "EPS_*", "Intra_MME_*", "UE_*", "S1_Paging*"]
  tag = "sessionName"
  template = '{{ .Tag "device" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}-emm'
  [processors.template.tagpass]
  schema = ["mme"]

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["EMM_*", "EPS_*", "Intra_MME_*", "UE_*", "S1_Paging*"]
  tag = "sessionId"
  template = '{{ .Tag "node_id" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}-emm'
  [processors.template.tagpass]
  schema = ["mme"]

#######################
# GROUP 4: PDN/DCNR metrics (28 KPIs) → mme-pdn
# Includes: MME_PDN_*, MME_DCNR_*
#######################

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["MME_PDN_*", "MME_DCNR_*"]
  tag = "objectType"
  template = 'cisco-mobilitycore-pm-{{ .Tag "schema" }}-pdn'
  [processors.template.tagpass]
  schema = ["mme"]

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["MME_PDN_*", "MME_DCNR_*"]
  tag = "sessionName"
  template = '{{ .Tag "device" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}-pdn'
  [processors.template.tagpass]
  schema = ["mme"]

[[processors.template]]
  order = 7
  namedrop = ["internal_*"]
  namepass = ["MME_PDN_*", "MME_DCNR_*"]
  tag = "sessionId"
  template = '{{ .Tag "node_id" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}-pdn'
  [processors.template.tagpass]
  schema = ["mme"]

#######################
# GROUP 5: DEFAULT (34 KPIs remaining) → mme (base)
# All other MME metrics not matching above groups
#######################

# Default: sessionName (non-p2p schemas, excluding split groups)
[[processors.template]]
  order = 8
  namedrop = ["internal_*", "MME_Inter_*", "MME_Intra_*", "EMM_*", "EPS_*", "Intra_MME_*", "UE_*", "S1_Paging*", "MME_PDN_*", "MME_DCNR_*"]
  tag = "sessionName"
  template = '{{ .Tag "device" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}'
  [processors.template.tagdrop]
  schema = ["p2p"]

# Default: sessionId (non-p2p schemas, excluding split groups)
[[processors.template]]
  order = 8
  namedrop = ["internal_*", "MME_Inter_*", "MME_Intra_*", "EMM_*", "EPS_*", "Intra_MME_*", "UE_*", "S1_Paging*", "MME_PDN_*", "MME_DCNR_*"]
  tag = "sessionId"
  template = '{{ .Tag "node_id" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}'
  [processors.template.tagdrop]
  schema = ["p2p"]

# Default: objectType (excluding split groups)
[[processors.template]]
  order = 8
  namedrop = ["internal_*", "MME_Inter_*", "MME_Intra_*", "EMM_*", "EPS_*", "Intra_MME_*", "UE_*", "S1_Paging*", "MME_PDN_*", "MME_DCNR_*"]
  tag = "objectType"
  template = 'cisco-mobilitycore-pm-{{ .Tag "schema" }}'

# p2p: sessionName (no index)
[[processors.template]]
  order = 8
  namedrop = ["internal_*"]
  tag = "sessionName"
  template = '{{ .Tag "device" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}'
  [processors.template.tagpass]
  schema = ["p2p"]

# p2p: sessionId (no index)
[[processors.template]]
  order = 8
  namedrop = ["internal_*"]
  tag = "sessionId"
  template = '{{ .Tag "node_id" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}'
  [processors.template.tagpass]
  schema = ["p2p"]

# Direction tag for all metrics
[[processors.template]]
  order = 8
  namedrop = ["internal_*"]
  tag = "direction"
  template = "-1"

[[processors.rename]]
  order = 8
  [[processors.rename.replace]]
    tag = "node_ip"
    dest = "source_ip"

# Filter out p2p_protocol objects
[[processors.starlark]]
  order = 9
  namedrop = ["internal_*"]

  source = '''
def apply(metric):
    index = metric.tags.get("index", "")
    if "p2p_protocol#" in index:
        return []
    else:
        return metric
  '''
  [processors.starlark.tagpass]
  schema = ["p2p"]

#######################
# SAFETY CHECK: KPI LIMIT PER OBJECT TYPE
# 
# This processor enforces the 40 KPI per objectType limit.
# If an objectType accumulates more than MAX_KPIS unique metric names,
# additional metrics are dropped and an ALERT METRIC is generated.
#
# Alert metrics (kpi_limit_alert) are created with severity levels:
#   - warning: approaching limit (35+ KPIs)
#   - critical: limit exceeded, metrics being dropped
#######################
[[processors.starlark]]
  order = 10
  namedrop = ["internal_*", "kpi_limit_alert"]
  
  source = '''
MAX_KPIS_PER_OBJECT = 40
WARNING_THRESHOLD = 35
RESET_WINDOW_SECONDS = 300

def apply(metric):
    object_type = metric.tags.get("objectType", "unknown")
    schema = metric.tags.get("schema", "")
    kpi_name = metric.name
    current_time = metric.time
    
    if object_type not in state:
        state[object_type] = {
            "kpis": {},
            "last_reset": current_time,
            "dropped_count": 0,
            "last_alert_time": 0,
        }
    
    obj_state = state[object_type]
    
    # Reset window check
    time_diff = current_time - obj_state["last_reset"]
    if time_diff > RESET_WINDOW_SECONDS * 1000000000:
        if obj_state["dropped_count"] > 0:
            alert = Metric("kpi_limit_alert")
            alert.tags["objectType"] = object_type
            alert.tags["schema"] = schema
            alert.tags["severity"] = "critical"
            alert.tags["alert_type"] = "period_summary"
            alert.fields["dropped_count"] = obj_state["dropped_count"]
            alert.fields["unique_kpis"] = len(obj_state["kpis"])
            alert.fields["message"] = "Period ended: %d metrics dropped for objectType %s" % (
                obj_state["dropped_count"], object_type)
            alert.time = current_time
            obj_state["kpis"] = {}
            obj_state["last_reset"] = current_time
            obj_state["dropped_count"] = 0
            obj_state["last_alert_time"] = 0
            return [metric, alert]
        obj_state["kpis"] = {}
        obj_state["last_reset"] = current_time
        obj_state["dropped_count"] = 0
        obj_state["last_alert_time"] = 0
    
    if kpi_name in obj_state["kpis"]:
        return metric
    
    current_count = len(obj_state["kpis"])
    
    if current_count >= MAX_KPIS_PER_OBJECT:
        obj_state["dropped_count"] = obj_state["dropped_count"] + 1
        
        # Create critical alert (throttled to once per 60 seconds)
        alert_interval = 60 * 1000000000
        if current_time - obj_state["last_alert_time"] > alert_interval:
            obj_state["last_alert_time"] = current_time
            alert = Metric("kpi_limit_alert")
            alert.tags["objectType"] = object_type
            alert.tags["schema"] = schema
            alert.tags["severity"] = "critical"
            alert.tags["alert_type"] = "limit_exceeded"
            alert.fields["dropped_kpi"] = kpi_name
            alert.fields["current_count"] = current_count
            alert.fields["limit"] = MAX_KPIS_PER_OBJECT
            alert.fields["dropped_total"] = obj_state["dropped_count"]
            alert.fields["message"] = "KPI limit exceeded for %s: %s dropped (total: %d)" % (
                object_type, kpi_name, obj_state["dropped_count"])
            alert.time = current_time
            return alert
        return []
    
    obj_state["kpis"][kpi_name] = True
    
    if current_count >= WARNING_THRESHOLD:
        alert_interval = 60 * 1000000000
        if current_time - obj_state.get("last_warning_time", 0) > alert_interval:
            obj_state["last_warning_time"] = current_time
            alert = Metric("kpi_limit_alert")
            alert.tags["objectType"] = object_type
            alert.tags["schema"] = schema
            alert.tags["severity"] = "warning"
            alert.tags["alert_type"] = "approaching_limit"
            alert.fields["current_count"] = current_count + 1
            alert.fields["limit"] = MAX_KPIS_PER_OBJECT
            alert.fields["message"] = "Approaching KPI limit for %s: %d/%d" % (
                object_type, current_count + 1, MAX_KPIS_PER_OBJECT)
            alert.time = current_time
            return [metric, alert]
    
    return metric
'''

[[processors.tag_limit]]
  order = 11
  namedrop = ["internal_*"]
  limit = 10
  keep = ["sessionId", "sessionName", "objectType", "direction", "source_ip"]
  [processors.tag_limit.tagdrop]
  schema = ["p2p",""]

