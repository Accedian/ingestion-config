#######################
# Cisco PCA Fault and Mobility PM Ingestion pipeline config
# METRIC ROUTING IMPLEMENTATION (EXACT RULES)
# 
# This config uses EXACT KPI names (no wildcards/patterns) for production safety.
# All KPI→objectType mappings are derived from the CSV catalog.
# Both telegraf-starlark.conf and this file now use exact matches.
#
# SOURCE OF TRUTH: Kpi_calc_Kpicatalog-updatedGrouping.csv
# Use: go run generate_splitting_rules.go -format routing to regenerate
#
# Schemas requiring splitting (>40 KPIs):
#   MME (150 KPIs → 7 objectTypes):
#     mme-inter:   24 KPIs (exact names from CSV)
#     mme-intra:   20 KPIs (exact names from CSV)
#     mme-dcnr:    19 KPIs (exact names from CSV)
#     mme-pdn:     15 KPIs (exact names from CSV)
#     mme-failure: 24 KPIs (exact names from CSV)
#     mme-sr:      22 KPIs (exact names from CSV)
#     mme:         26 KPIs (remaining - base objectType)
#
# All other schemas are under 40 KPIs (no splitting needed)
#######################

[[inputs.kafka_consumer]]
  interval = "60s"
  brokers = ["{{server_ip}}:9092"]
  topics = ["pca_kpi_topic"]
  offset = "oldest"
  max_message_len = 1000000
  data_format = "json"
  json_query = "@this"
  json_name_key = "kpi"
  json_time_key = "timestamp"
  json_time_format = "unix"
  tag_keys = ["device", "kpi","index","node_id","schema", "source_ip", "node_ip"]

# Processor: Use regex to clean the "index" tag and remove the square brackets
[[processors.regex]]
  order = 3
  namedrop = ["internal_*"]
  [[processors.regex.tags]]
    key = "index"
    pattern = '^\["(.*?)"\]$'
    replacement = '${1}'

# Processor: to clean the "index" tag and remove the unsupported comma chars
[[processors.strings]]
  order = 4
  [[processors.strings.replace]]
    tag = "index"
    old = ","
    new = "_"
# AUTO-GENERATED ROUTING RULES FROM CSV CATALOG (EXACT MATCHES)
# Source of truth: Kpi_calc_Kpicatalog-updatedGrouping.csv
# Logic: Use column 3 (ObjectIdentifier) if defined, otherwise column 2 (Schema)
#
# Each group has 3 template blocks: objectType, sessionName, sessionId
# Uses exact KPI names in namepass (no wildcards)

