#######################
# ALERT OUTPUT CONFIGURATION
# 
# Route kpi_limit_alert metrics to a dedicated endpoint for monitoring.
# Choose one of the options below based on your alerting infrastructure.
#######################

# Option 1: Separate WebSocket for alerts (to telemetry-collector alert handler)
# [[outputs.websocket]]
#   namepass = ["kpi_limit_alert"]
#   url = "ws://127.0.0.1:3000/alerts"
#   connect_timeout = "10s"
#   write_timeout = "15s"
#   read_timeout = "0s"
#   data_format = "json"
#   [outputs.websocket.headers]
#   Content-Type = "application/json"

# Option 2: HTTP POST to alerting API
# [[outputs.http]]
#   namepass = ["kpi_limit_alert"]
#   url = "http://127.0.0.1:3000/api/alerts"
#   method = "POST"
#   data_format = "json"
#   [outputs.http.headers]
#   Content-Type = "application/json"

# Option 3: Write alerts to rotating log file (for log aggregators like Splunk/ELK)
[[outputs.file]]
  namepass = ["kpi_limit_alert"]
  files = ["/tmp/kpi_alerts.log"]
  data_format = "json"
  rotation_max_size = "10MB"
  rotation_max_archives = 5
