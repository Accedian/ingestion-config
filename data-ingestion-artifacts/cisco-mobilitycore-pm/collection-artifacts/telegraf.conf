[[inputs.kafka_consumer]]
  interval = "60s" # Frequency of metric collection
#  brokers = ["10.122.5.51:9092"] ## 1st matrix lab location - partial STC dataset
  brokers = ["10.128.0.190:9092"] ## npavlab location - older rakuten dataset 
  topics = ["pca_kpi_topic"]
  offset = "oldest"
  max_message_len = 1000000
  data_format = "json"
  json_query = "@this"
  json_name_key = "kpi"
  json_time_key = "timestamp"
  json_time_format = "unix"
  tag_keys = ["device", "kpi","index","node_id","schema", "source_ip", "node_ip"]

# Processor: Use regex to clean the "index" tag
[[processors.regex]]
  order = 3
  namedrop = ["internal_*"]
  [[processors.regex.tags]]
    key = "index"                      # Target the "index" tag
    pattern = '^\["(.*?)"\]$'          # Match the pattern ["value"]
    replacement = '${1}'               # Extract only the value (e.g., card#1)


# Processor: Use regex to clean the "index" tag
[[processors.regex]]
  order = 3
  namedrop = ["internal_*"]
  [[processors.regex.tags]]
    key = "index"                      # Target the "index" tag
    pattern = '^\["(.*?)"\]$'          # Match the pattern ["value"]
    replacement = '${1}'               # Extract only the value (e.g., card#1)

[[processors.strings]]
  order = 4
  [[processors.strings.replace]]
    tag = "index"   # The specific tag key to apply this replacement to
    old = ","       # The string to find (the comma)
    new = "_"    # The string to replace with (the underscore)

[[processors.template]]
  order = 8
  namedrop = ["internal_*"]
  tag = "sessionName"
  template = '{{ .Tag "device" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}'
  [processors.template.tagdrop]
  schema = ["p2p"]
[[processors.template]]
  order = 8
  namedrop = ["internal_*"]
  tag = "sessionId"
  template = '{{ .Tag "node_id" }}_{{ .Tag "index" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}'
  [processors.template.tagdrop]
  schema = ["p2p"]

[[processors.template]]
  order = 8
  namedrop = ["internal_*"]
  tag = "sessionName"
  template = '{{ .Tag "device" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}'
  [processors.template.tagpass]
  schema = ["p2p"]
[[processors.template]]
  order = 8
  namedrop = ["internal_*"]
  tag = "sessionId"
  template = '{{ .Tag "node_id" }}_cisco-mobilitycore-pm-{{ .Tag "schema" }}'
  [processors.template.tagpass]
  schema = ["p2p"]


[[processors.template]]
  order = 8
  namedrop = ["internal_*"]
  tag = "objectType"
  template = 'cisco-mobilitycore-pm-{{ .Tag "schema" }}'

[[processors.template]]
  order = 8
  namedrop = ["internal_*"]
  tag = "direction"
  template = "-1"

[[processors.rename]]
  order = 8
  [[processors.rename.replace]]
    tag = "node_ip"
    dest = "source_ip"


[[processors.starlark]]
  order = 9
  namedrop = ["internal_*"]

  source = '''
def apply(metric):
    
## !!! This processor was meant to pivot all 800+ p2p_protocol objects into a single object with 800+ metrics
## That idea is shelved for now and we will revisit with a better strategy
## Since we do not want to pollute our inventory with the 800+ objects, Im using this code to return an empty metric
## Essentially removing the p2p_protocol objects from the stream 

    # Extract the "index" tag from the metric
    index = metric.tags.get("index", "")

    if "p2p_protocol#" in index:

        # If the index contains "p2p_protocol#", extract the part after the #
        # index_suffix = index.split("#", 1)[1]
        # clean_suffix = index_suffix.replace("-", "_")
        # new_metric_name = metric.name + "_" + clean_suffix

        # new_metric = deepcopy(metric)
        # new_metric.name = new_metric_name
        # return new_metric


        ## !! RETURNING EMPTY !! instead of the processed metric
        return []
    else:
        return metric
  '''
  [processors.starlark.tagpass]
  schema = ["p2p"]

[[processors.tag_limit]]
order = 10
  namedrop = ["internal_*"]
  # fieldinclude = []
  ## Maximum number of tags to preserve
  limit = 10
  # List of tags to preferentially preserve
  keep = ["sessionId", "sessionName", "objectType", "direction", "source_ip"]
  [processors.tag_limit.tagdrop]
  schema = ["p2p",""]
