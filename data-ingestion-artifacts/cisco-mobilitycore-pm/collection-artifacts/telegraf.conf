## STORAGE USIBNG THE CONFIG BELOW. THE FOLLOWING OUTPUTS ARE NOT REQUIRED 
## FOR NORMAL OPERATION WITH PCA TELEMETRY COLLECTOR. YOU CAN LEAVE THEM
## COMMENTED OUT. (ETMARTEL)
