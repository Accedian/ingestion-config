#######################
#######################
# Cisco PCA Fault and Mobility PM Ingestion pipeline config
# STARLARK-BASED IMPLEMENTATION (Extensible)
# 
# This implementation uses a centralized Starlark processor to handle
# object type splitting based on exact KPI name matches. Easy to extend
# by adding new rules to the EXACT_RULES dictionary.
#######################

[[inputs.kafka_consumer]]
  interval = "60s"
  brokers = ["{{server_ip}}:9092"]
  topics = ["pca_kpi_topic"]
  offset = "oldest"
  max_message_len = 1000000
  data_format = "json"
  json_query = "@this"
  json_name_key = "kpi"
  json_time_key = "timestamp"
  json_time_format = "unix"
  tag_keys = ["device", "kpi","index","node_id","schema", "source_ip", "node_ip"]

# Processor: Use regex to clean the "index" tag and remove the square brackets
[[processors.regex]]
  order = 3
  namedrop = ["internal_*"]
  [[processors.regex.tags]]
    key = "index"
    pattern = '^\["(.*?)"\]$'
    replacement = '${1}'

# Processor: to clean the "index" tag and remove the unsupported comma chars
[[processors.strings]]
  order = 4
  [[processors.strings.replace]]
    tag = "index"
    old = ","
    new = "_"

#######################
# STARLARK PROCESSOR - GENERIC KPI SPLITTING FRAMEWORK
# 
# This processor handles the 40 KPI per objectType limit for ALL schemas.
#
# SOURCE OF TRUTH: Kpi_calc_Kpicatalog-updatedGrouping.csv
# LOGIC: Use column 3 (ObjectIdentifier) if defined, otherwise column 2 (Schema)
# Use: go run generate_splitting_rules.go -format starlark to regenerate rules
#
# EXACT_RULES contains explicit KPI→suffix mappings from the CSV catalog.
# Only exact KPI name matches are used (no prefix/suffix pattern matching).
# KPIs not in EXACT_RULES use the base objectType (schema only).
#
# CURRENT SCHEMAS REQUIRING SPLITTING:
#   - mme (150 KPIs → 7 objectTypes)
#
# SCHEMAS UNDER LIMIT (no rules needed):
#   - egtpc (30), schema (30), mme-paging-profile (20), tai (14)
#   - card (11), hss (11), port (11), apn (8), and others
#######################
