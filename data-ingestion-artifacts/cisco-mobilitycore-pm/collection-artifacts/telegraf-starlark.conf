def apply(metric):
    # Get metric name (KPI) and schema
    kpi = metric.name
    schema = metric.tags.get("schema", "")
    device = metric.tags.get("device", "")
    index = metric.tags.get("index", "")
    node_id = metric.tags.get("node_id", "")
    
    # Lookup exact KPI name in rules - no pattern matching
    suffix = EXACT_RULES.get(kpi, "")
    
    # Build object type base
    object_type_base = "cisco-mobilitycore-pm-" + schema
    
    # Apply suffix if matched
    object_type = object_type_base + suffix
    
    # Build sessionName and sessionId based on schema type
    if schema == "p2p":
        # p2p schema doesnt include index
        session_name = device + "_" + object_type_base + suffix
        session_id = node_id + "_" + object_type_base + suffix
    else:
        # Standard schemas include index
        session_name = device + "_" + index + "_" + object_type_base + suffix
        session_id = node_id + "_" + index + "_" + object_type_base + suffix
    
    # Set the computed tags
    metric.tags["sessionName"] = session_name
    metric.tags["sessionId"] = session_id
    metric.tags["objectType"] = object_type
    metric.tags["direction"] = "-1"
    
    return metric
'''
  [processors.starlark.tagdrop]
  schema = ["p2p"]

# Handle p2p schema separately (no index in session identifiers)
[[processors.starlark]]
  order = 7
  namedrop = ["internal_*"]
  
  source = '''
def apply(metric):
    schema = metric.tags.get("schema", "")
    device = metric.tags.get("device", "")
    node_id = metric.tags.get("node_id", "")
    
    object_type = "cisco-mobilitycore-pm-" + schema
    session_name = device + "_" + object_type
    session_id = node_id + "_" + object_type
    
    metric.tags["sessionName"] = session_name
    metric.tags["sessionId"] = session_id
    metric.tags["objectType"] = object_type
    metric.tags["direction"] = "-1"
    
    return metric
'''
  [processors.starlark.tagpass]
  schema = ["p2p"]

