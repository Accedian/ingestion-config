#######################
# Cisco PCA Fault and Mobility PM Ingestion pipeline config
# STARLARK-BASED IMPLEMENTATION (Extensible)
# 
# This implementation uses a centralized Starlark processor to handle
# object type splitting based on KPI name patterns. Easy to extend
# by adding new rules to the SUFFIX_RULES dictionary.
#######################

[[inputs.kafka_consumer]]
  interval = "60s"
  brokers = ["{{server_ip}}:9092"]
  topics = ["pca_kpi_topic"]
  offset = "oldest"
  max_message_len = 1000000
  data_format = "json"
  json_query = "@this"
  json_name_key = "kpi"
  json_time_key = "timestamp"
  json_time_format = "unix"
  tag_keys = ["device", "kpi","index","node_id","schema", "source_ip", "node_ip"]

# Processor: Use regex to clean the "index" tag and remove the square brackets
[[processors.regex]]
  order = 3
  namedrop = ["internal_*"]
  [[processors.regex.tags]]
    key = "index"
    pattern = '^\["(.*?)"\]$'
    replacement = '${1}'

# Processor: to clean the "index" tag and remove the unsupported comma chars
[[processors.strings]]
  order = 4
  [[processors.strings.replace]]
    tag = "index"
    old = ","
    new = "_"

#######################
# STARLARK PROCESSOR - GENERIC KPI SPLITTING FRAMEWORK
# 
# This processor handles the 40 KPI per objectType limit for ALL schemas.
# When a schema exceeds 40 KPIs, add splitting rules to the SUFFIX_RULES dict.
#
# HOW TO ADD A NEW SCHEMA:
# ========================
# 1. Count unique KPIs: jq -r '.[] | select(.schema=="<name>") | .kpi' data.json | sort -u | wc -l
# 2. If count > 40, analyze KPI prefixes to find logical groupings
# 3. Add rules to SUFFIX_RULES ensuring each group has ≤40 KPIs
# 
# RULE FORMAT:
#   "schema_name": [
#       ("KPI_PREFIX_", "-suffix"),  # All KPIs starting with prefix → schema-suffix
#       ...
#   ]
#
# CURRENT SCHEMAS REQUIRING SPLITTING:
#   - mme (157 KPIs → 6 objectTypes)
#   - apn (58 KPIs → 4 objectTypes)
#   - saegw (49 KPIs → 3 objectTypes)
#
# SCHEMAS NEAR LIMIT (monitor for growth):
#   - schema (37 KPIs)
#
# SCHEMAS UNDER LIMIT (no rules needed):
#   - egtpc (32 KPIs)
#   - 5gsystem (28 KPIs)
#   - All others (<20 KPIs)
#######################
[[processors.starlark]]
  order = 7
  namedrop = ["internal_*"]
  
  source = '''
# =============================================================================
# GENERIC KPI SPLITTING RULES
# 
# Format: { "schema_name": [("kpi_prefix", "-suffix"), ...], ... }
# 
# - Only schemas exceeding 40 KPIs need entries here
# - Rules evaluated in order - first prefix match wins
# - KPIs not matching any rule use base objectType (empty suffix)
# - Safety check at order=10 enforces 40 KPI limit at runtime
# 
# =============================================================================
# CURRENT SPLITTING RULES
# =============================================================================

SUFFIX_RULES = {
    # -------------------------------------------------------------------------
    # MME Schema (157 KPIs → 6 objectTypes, each ≤40 KPIs)
    # -------------------------------------------------------------------------
    "mme": [
        # Group 1: Inter TAU metrics (24 KPIs)
        ("MME_Inter_", "-inter"),
        
        # Group 2: Intra TAU metrics (21 KPIs) 
        ("MME_Intra_", "-intra"),
        
        # Group 3: EMM/EPS mobility management (22 KPIs)
        ("EMM_", "-emm"),
        ("EPS_", "-emm"),
        ("Intra_MME_", "-emm"),
        ("UE_", "-emm"),
        ("S1_Paging", "-emm"),
        
        # Group 4: PDN connectivity & DCNR (36 KPIs)
        ("MME_PDN_", "-pdn"),
        ("MME_DCNR_", "-pdn"),
        
        # Group 5: Session/handover/ERAB metrics (19 KPIs)
        ("MME_S1", "-session"),       # MME_S1_* (8 KPIs)
        ("MME_eRAB", "-session"),     # MME_eRAB_* (4 KPIs)
        ("MME_ERAB", "-session"),     # MME_ERAB_* (2 KPIs)
        ("Paging_", "-session"),      # Paging_* (5 KPIs)
        
        # Group 6: Everything else stays on base mme objectType (35 KPIs)
        # No rule needed - falls through to default (empty suffix)
    ],
    
    # -------------------------------------------------------------------------
    # APN Schema (58 KPIs → 4 objectTypes, each ≤20 KPIs)
    # -------------------------------------------------------------------------
    "apn": [
        # Group 1: Bearer-related metrics (13 KPIs)
        ("APN_Number_of_Bearer_", "-bearer"),
        
        # Group 2: Packet drop metrics (13 KPIs)
        ("APN_Packet_Drop", "-drop"),
        
        # Group 3: Total/aggregation metrics (13 KPIs)
        ("APN_Total_", "-total"),
        
        # Group 4: Everything else stays on base apn objectType (19 KPIs)
        # No rule needed - falls through to default (empty suffix)
    ],
    
    # -------------------------------------------------------------------------
    # SAEGW Schema (49 KPIs → 3 objectTypes, each ≤26 KPIs)
    # -------------------------------------------------------------------------
    "saegw": [
        # Group 1: PGW-specific metrics (13 KPIs)
        ("SAEGW_PGW_", "-pgw"),
        
        # Group 2: QCI-related metrics (10 KPIs)
        ("SAEGW_QCI", "-qci"),
        
        # Group 3: Everything else stays on base saegw objectType (26 KPIs)
        # No rule needed - falls through to default (empty suffix)
    ],
    
    # -------------------------------------------------------------------------
    # TEMPLATE: Add new schemas here when they exceed 40 KPIs
    # -------------------------------------------------------------------------
    # 
    # "egtpc": [
    #     # When egtpc exceeds 40 KPIs, analyze prefixes and add rules:
    #     # ("Create_Bearer_", "-bearer"),     # Bearer-related KPIs
    #     # ("Create_Session_", "-session"),   # Session-related KPIs
    #     # ("Delete_", "-delete"),            # Delete operations
    # ],
    # 
    # "hss": [
    #     # When hss exceeds 40 KPIs:
    #     # ("HSS_Update_", "-update"),
    #     # ("HSS_Query_", "-query"),
    # ],
    # 
    # "5gsystem": [
    #     # For 5G SMF/UPF schemas:
    #     # ("Int_N10_", "-n10"),
    #     # ("Int_N11_", "-n11"),
    #     # ("Int_N4_", "-n4"),
    #     # ("Int_N7_", "-n7"),
    # ],
}

def apply(metric):
    # Get metric name (KPI) and schema
    kpi = metric.name
    schema = metric.tags.get("schema", "")
    device = metric.tags.get("device", "")
    index = metric.tags.get("index", "")
    node_id = metric.tags.get("node_id", "")
    
    # Determine suffix based on rules
    suffix = ""
    if schema in SUFFIX_RULES:
        for prefix, sfx in SUFFIX_RULES[schema]:
            if kpi.startswith(prefix):
                suffix = sfx
                break
    
    # Build object type base
    object_type_base = "cisco-mobilitycore-pm-" + schema
    
    # Apply suffix if matched
    object_type = object_type_base + suffix
    
    # Build sessionName and sessionId based on schema type
    if schema == "p2p":
        # p2p schema doesnt include index
        session_name = device + "_" + object_type_base + suffix
        session_id = node_id + "_" + object_type_base + suffix
    else:
        # Standard schemas include index
        session_name = device + "_" + index + "_" + object_type_base + suffix
        session_id = node_id + "_" + index + "_" + object_type_base + suffix
    
    # Set the computed tags
    metric.tags["sessionName"] = session_name
    metric.tags["sessionId"] = session_id
    metric.tags["objectType"] = object_type
    metric.tags["direction"] = "-1"
    
    return metric
'''
  [processors.starlark.tagdrop]
  schema = ["p2p"]

# Handle p2p schema separately (no index in session identifiers)
[[processors.starlark]]
  order = 7
  namedrop = ["internal_*"]
  
  source = '''
def apply(metric):
    schema = metric.tags.get("schema", "")
    device = metric.tags.get("device", "")
    node_id = metric.tags.get("node_id", "")
    
    object_type = "cisco-mobilitycore-pm-" + schema
    session_name = device + "_" + object_type
    session_id = node_id + "_" + object_type
    
    metric.tags["sessionName"] = session_name
    metric.tags["sessionId"] = session_id
    metric.tags["objectType"] = object_type
    metric.tags["direction"] = "-1"
    
    return metric
'''
  [processors.starlark.tagpass]
  schema = ["p2p"]

# Filter out p2p_protocol objects (keeping existing logic)
[[processors.starlark]]
  order = 9
  namedrop = ["internal_*"]

  source = '''
def apply(metric):
    index = metric.tags.get("index", "")
    if "p2p_protocol#" in index:
        return []
    else:
        return metric
  '''
  [processors.starlark.tagpass]
  schema = ["p2p"]

[[processors.rename]]
  order = 8
  [[processors.rename.replace]]
    tag = "node_ip"
    dest = "source_ip"

#######################
# SAFETY CHECK: KPI LIMIT PER OBJECT TYPE
# 
# This processor enforces the 40 KPI per objectType limit.
# If an objectType accumulates more than MAX_KPIS unique metric names,
# additional metrics are dropped and an ALERT METRIC is generated.
#
# Alert metrics (kpi_limit_alert) are created with severity levels:
#   - warning: approaching limit (35+ KPIs)
#   - critical: limit exceeded, metrics being dropped
#
# These alert metrics can be routed to a separate output for monitoring.
# The state resets based on timestamp boundaries (configurable window).
#######################
[[processors.starlark]]
  order = 10
  namedrop = ["internal_*", "kpi_limit_alert"]
  
  source = '''
# Configuration
MAX_KPIS_PER_OBJECT = 40  # Maximum unique KPIs allowed per objectType
WARNING_THRESHOLD = 35    # Warn when approaching limit
RESET_WINDOW_SECONDS = 300  # Reset counters every 5 minutes (300s)

# State tracking
# Format: { "objectType": {"kpis": set(), "last_reset": timestamp} }

def apply(metric):
    object_type = metric.tags.get("objectType", "unknown")
    schema = metric.tags.get("schema", "")
    kpi_name = metric.name
    current_time = metric.time
    
    # Initialize state for this objectType if not exists
    if object_type not in state:
        state[object_type] = {
            "kpis": {},
            "last_reset": current_time,
            "dropped_count": 0,
            "last_alert_time": 0,
        }
    
    obj_state = state[object_type]
    
    # Check if we need to reset the window
    time_diff = current_time - obj_state["last_reset"]
    if time_diff > RESET_WINDOW_SECONDS * 1000000000:  # nanoseconds
        # Create summary alert if we dropped any metrics
        if obj_state["dropped_count"] > 0:
            alert = Metric("kpi_limit_alert")
            alert.tags["objectType"] = object_type
            alert.tags["schema"] = schema
            alert.tags["severity"] = "critical"
            alert.tags["alert_type"] = "period_summary"
            alert.fields["dropped_count"] = obj_state["dropped_count"]
            alert.fields["unique_kpis"] = len(obj_state["kpis"])
            alert.fields["message"] = "Period ended: %d metrics dropped for objectType %s" % (
                obj_state["dropped_count"], object_type)
            alert.time = current_time
            # Reset state
            obj_state["kpis"] = {}
            obj_state["last_reset"] = current_time
            obj_state["dropped_count"] = 0
            obj_state["last_alert_time"] = 0
            return [metric, alert]
        # Reset state without alert
        obj_state["kpis"] = {}
        obj_state["last_reset"] = current_time
        obj_state["dropped_count"] = 0
        obj_state["last_alert_time"] = 0
    
    # Check if KPI already tracked (allowed)
    if kpi_name in obj_state["kpis"]:
        return metric
    
    # Check if we are at the limit
    current_count = len(obj_state["kpis"])
    
    if current_count >= MAX_KPIS_PER_OBJECT:
        # DROP the metric - we have exceeded the limit
        obj_state["dropped_count"] = obj_state["dropped_count"] + 1
        
        # Create critical alert (throttled to once per 60 seconds per objectType)
        alert_interval = 60 * 1000000000  # 60 seconds in nanoseconds
        if current_time - obj_state["last_alert_time"] > alert_interval:
            obj_state["last_alert_time"] = current_time
            alert = Metric("kpi_limit_alert")
            alert.tags["objectType"] = object_type
            alert.tags["schema"] = schema
            alert.tags["severity"] = "critical"
            alert.tags["alert_type"] = "limit_exceeded"
            alert.fields["dropped_kpi"] = kpi_name
            alert.fields["current_count"] = current_count
            alert.fields["limit"] = MAX_KPIS_PER_OBJECT
            alert.fields["dropped_total"] = obj_state["dropped_count"]
            alert.fields["message"] = "KPI limit exceeded for %s: %s dropped (total: %d)" % (
                object_type, kpi_name, obj_state["dropped_count"])
            alert.time = current_time
            return alert  # Return only alert, drop the original metric
        
        return []  # Drop metric silently (already alerted recently)
    
    # Add this KPI to tracking and allow the metric
    obj_state["kpis"][kpi_name] = True
    
    # Log warning when approaching limit
    if current_count >= WARNING_THRESHOLD:
        # Throttle warnings to once per 60 seconds
        alert_interval = 60 * 1000000000
        if current_time - obj_state.get("last_warning_time", 0) > alert_interval:
            obj_state["last_warning_time"] = current_time
            alert = Metric("kpi_limit_alert")
            alert.tags["objectType"] = object_type
            alert.tags["schema"] = schema
            alert.tags["severity"] = "warning"
            alert.tags["alert_type"] = "approaching_limit"
            alert.fields["current_count"] = current_count + 1
            alert.fields["limit"] = MAX_KPIS_PER_OBJECT
            alert.fields["message"] = "Approaching KPI limit for %s: %d/%d" % (
                object_type, current_count + 1, MAX_KPIS_PER_OBJECT)
            alert.time = current_time
            return [metric, alert]
    
    return metric
'''

[[processors.tag_limit]]
  order = 11
  namedrop = ["internal_*"]
  limit = 10
  keep = ["sessionId", "sessionName", "objectType", "direction", "source_ip"]
  [processors.tag_limit.tagdrop]
  schema = ["p2p",""]

#######################
# ALERT OUTPUT CONFIGURATION
# 
# Route kpi_limit_alert metrics to a dedicated endpoint for monitoring.
# Choose one of the options below based on your alerting infrastructure.
#######################

# Option 1: Separate WebSocket for alerts (to telemetry-collector alert handler)
# [[outputs.websocket]]
#   namepass = ["kpi_limit_alert"]
#   url = "ws://127.0.0.1:3000/alerts"
#   connect_timeout = "10s"
#   write_timeout = "15s"
#   read_timeout = "0s"
#   data_format = "json"
#   [outputs.websocket.headers]
#   Content-Type = "application/json"

# Option 2: HTTP POST to alerting API
# [[outputs.http]]
#   namepass = ["kpi_limit_alert"]
#   url = "http://127.0.0.1:3000/api/alerts"
#   method = "POST"
#   data_format = "json"
#   [outputs.http.headers]
#   Content-Type = "application/json"

# Option 3: Write alerts to rotating log file (for log aggregators like Splunk/ELK)
[[outputs.file]]
  namepass = ["kpi_limit_alert"]
  files = ["/tmp/kpi_alerts.log"]
  data_format = "json"
  rotation_max_size = "10MB"
  rotation_max_archives = 5
