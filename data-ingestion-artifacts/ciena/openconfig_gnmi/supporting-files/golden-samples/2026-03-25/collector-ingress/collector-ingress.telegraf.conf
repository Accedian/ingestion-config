# Ciena gNMI Dial-In Telegraf Configuration
# Device: 192.168.20.105:9339

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 5000
  metric_buffer_limit = 50000
  collection_jitter = "0s"
  flush_interval = "50s"
  flush_jitter = "0s"
  precision = "0s"
  debug = true
  hostname = ""
  omit_hostname = false

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

[[inputs.gnmi]]
  addresses = ["192.168.20.105:9339"]
  username = "diag"
  password = "ciena123"
  encoding = "json_ietf"
  redial = "30s"
  max_msg_size = 0
  
  # TLS Configuration for mTLS
  tls_enable = true
  tls_cert = "/etc/telegraf/certs/client1.pem"
  tls_key = "/etc/telegraf/certs/client1.key"
  insecure_skip_verify = true
  tls_min_version = "TLS12"
  tls_cipher_suites = [
    "TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA",
    "TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA",
    "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256",
    "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384",
    "TLS_RSA_WITH_AES_128_CBC_SHA",
    "TLS_RSA_WITH_AES_256_CBC_SHA",
    "TLS_RSA_WITH_AES_128_GCM_SHA256",
    "TLS_RSA_WITH_AES_256_GCM_SHA384"
  ]

  # Subscription: Interface Counters (WORKING)
  [[inputs.gnmi.subscription]]
    name = "ciena_interface_counters"
    path = "/oc-if:interfaces/oc-if:interface/oc-if:state/oc-if:counters"
    subscription_mode = "sample"
    sample_interval = "30s"

###############################################################################
#                            PROCESSOR PLUGINS                                #
###############################################################################

[[outputs.file]]
  files = ["/capture/collector-ingress.jsonl"]
  data_format = "json"
