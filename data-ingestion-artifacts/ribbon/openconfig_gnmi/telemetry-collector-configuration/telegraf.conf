# Lab-reference artifact preserved from rapid EANTC interop work.
[agent]
  interval = "60s"
  flush_interval = "50s"
  # debug = true
  quiet = false

[[outputs.file]]
  files = ["stdout"]
  data_format = "json"


[[inputs.gnmi]]
  addresses = ["192.168.20.15:57400"]
  username = "__DEVICE_USERNAME__"
  password = "__DEVICE_PASSWORD__"
  encoding = "proto"
  insecure_skip_verify = true
  redial = "10s"
  path_guessing_strategy = "subscription"

[[inputs.gnmi.subscription]]
  name = "ribbon_interfaces"
  origin = "openconfig-interfaces"
  path = "/interfaces/interface"
  subscription_mode = "sample"
  sample_interval = "60s"

[[inputs.gnmi.subscription]]
  name = "ribbon_components"
  origin = "openconfig-platform"
  path = "/components/component"
  subscription_mode = "sample"
  sample_interval = "60s"

# Starlark processor to parse and group interface/component metrics
# This splits the single massive metric into one metric per interface
# and creates sessionId tag from source_interface-name
[[processors.starlark]]
  order = 2
  source = '''
load("time.star", "time")

def apply(metric):
    # Detect data type and route to appropriate handler
    has_interfaces = False
    has_components = False
    
    for k in metric.fields.keys():
        if "interfaces/interface[name=" in k:
            has_interfaces = True
        if "components/component[name=" in k:
            has_components = True
        if has_interfaces and has_components:
            break
    
    results = []
    
    if has_interfaces:
        iface_metrics = process_interfaces(metric)
        for m in iface_metrics:
            results.append(m)
    
    if has_components:
        comp_metrics = process_components(metric)
        for m in comp_metrics:
            results.append(m)
    
    if results:
        return results
    
    # Unknown data type - pass through
    return metric

# ============================================================================
# INTERFACE PROCESSING
# ============================================================================
def process_interfaces(metric):
    new_metrics = []
    interfaces = {}
    
    # Handle both with and without origin prefix
    prefix = "interfaces/interface[name="
    
    for k, v in metric.fields.items():
        # Find where the interface path starts
        idx = k.find("interfaces/interface[name=")
        if idx == -1:
            continue
        
        # Extract from that point
        rest = k[idx + len(prefix):]
        bracket_pos = rest.find("]")
        if bracket_pos == -1:
            continue
        
        ifname_key = rest[:bracket_pos]
        remaining = rest[bracket_pos:]
        if not remaining.startswith("]/"):
            continue
        field_path = remaining[2:]
        
        if ifname_key not in interfaces:
            interfaces[ifname_key] = {
                "tags": {
                    "name": ifname_key,
                    "source": metric.tags.get("source", "unknown"),
                    "host": metric.tags.get("host", "unknown")
                },
                "fields": {}
            }
        
        interfaces[ifname_key]["fields"][field_path] = v
    
    if not interfaces:
        return []
    
    for ifname_key, data in interfaces.items():
        new_m = Metric("ribbon_interfaces")
        
        if "state/name" in data["fields"]:
            data["tags"]["name"] = data["fields"]["state/name"]
        
        new_m.tags.update(data["tags"])
        
        for field_key, field_val in data["fields"].items():
            val_str = str(field_val) if field_val != None else ""
            
            if is_mac_address(val_str):
                new_m.fields[field_key] = field_val
                continue
            
            if is_interface_name_field(field_key, val_str):
                new_m.fields[field_key] = field_val
                continue
            
            if is_low_cardinality(val_str):
                tag_name = field_path_to_tag_name(field_key, "interface")
                new_m.tags[tag_name] = val_str
            else:
                # Convert string numbers to actual numbers for Prometheus compatibility
                new_m.fields[field_key] = convert_to_number(field_val)
        
        # Use current time (nanoseconds since epoch)
        new_m.time = time.now().unix_nano
        #new_m.time = metric.time
        
        src = new_m.tags["source"]
        name = new_m.tags["name"]
        sess_id = "{}_{}_ribbon-interface".format(src, name)
        
        new_m.tags["sessionId"] = sess_id
        new_m.tags["sessionName"] = sess_id
        new_m.tags["objectType"] = "ribbon-interface"
        new_m.tags["direction"] = "0"
        
        new_metrics.append(new_m)
    
    return new_metrics

# ============================================================================
# COMPONENT PROCESSING
# ============================================================================
def process_components(metric):
    new_metrics = []
    components = {}
    
    # Handle both with and without origin prefix
    prefix = "components/component[name="
    
    for k, v in metric.fields.items():
        # Find where the component path starts
        idx = k.find("components/component[name=")
        if idx == -1:
            continue
        
        rest = k[idx + len(prefix):]
        bracket_pos = rest.find("]")
        if bracket_pos == -1:
            continue
        
        comp_name = rest[:bracket_pos]
        remaining = rest[bracket_pos:]
        if not remaining.startswith("]/"):
            continue
        field_path = remaining[2:]
        
        if comp_name not in components:
            components[comp_name] = {
                "tags": {
                    "name": comp_name,
                    "source": metric.tags.get("source", "unknown"),
                    "host": metric.tags.get("host", "unknown")
                },
                "fields": {}
            }
        
        components[comp_name]["fields"][field_path] = v
    
    if not components:
        return []
    
    for comp_name, data in components.items():
        new_m = Metric("ribbon_components")
        
        # Try to get cleaner name from state/name if available
        if "state/name" in data["fields"]:
            data["tags"]["name"] = data["fields"]["state/name"]
        
        # Determine component type from state/type field
        comp_type = "component"
        if "state/type" in data["fields"]:
            comp_type = data["fields"]["state/type"]
            # Clean up the type (e.g., "openconfig-platform-types:CPU" -> "CPU")
            if ":" in comp_type:
                comp_type = comp_type.split(":")[-1]
            data["tags"]["component_type"] = comp_type
        
        new_m.tags.update(data["tags"])
        
        for field_key, field_val in data["fields"].items():
            val_str = str(field_val) if field_val != None else ""
            
            # Skip high-cardinality fields (serial numbers, versions, descriptions, etc.)
            if is_component_high_cardinality_field(field_key, val_str):
                new_m.fields[field_key] = field_val
                continue
            
            if is_low_cardinality(val_str) or is_component_low_cardinality(val_str):
                tag_name = field_path_to_tag_name(field_key, "component")
                new_m.tags[tag_name] = val_str
            else:
                # Check if value is a measurement with unit (e.g., "31.6 celsius")
                if is_measurement_with_unit(val_str):
                    new_m.fields[field_key] = extract_numeric_value(field_val)
                else:
                    # Convert string numbers to actual numbers for Prometheus compatibility
                    new_m.fields[field_key] = convert_to_number(field_val)
        
        # Use current time (nanoseconds since epoch)
        new_m.time = time.now().unix_nano
        #new_m.time = metric.time

        src = new_m.tags["source"]
        name = new_m.tags["name"]
        object_type = "ribbon-{}".format(comp_type.lower())
        sess_id = "{}_{}_ribbon-component".format(src, name)
        
        new_m.tags["sessionId"] = sess_id
        new_m.tags["sessionName"] = sess_id
        new_m.tags["objectType"] = object_type
        new_m.tags["direction"] = "-1"
        
        new_metrics.append(new_m)
    
    return new_metrics

# ============================================================================
# HELPER FUNCTIONS
# ============================================================================

# Check if a value looks like a MAC address
def is_mac_address(val):
    if len(val) != 17:
        return False
    parts = val.split(":")
    return len(parts) == 6

# Check if field is a port/interface name (for interfaces)
def is_interface_name_field(field_key, field_val):
    name_field_patterns = ["/name", "/transceiver", "/description", "/ip"]
    
    for pattern in name_field_patterns:
        if field_key.endswith(pattern):
            return True
    
    if "/" in field_val or (field_val.startswith("lo") and "." in field_val):
        if " " not in field_val:
            return True
    
    return False

# Check if field is high cardinality for components (serial numbers, versions, etc.)
def is_component_high_cardinality_field(field_key, field_val):
    high_card_patterns = [
        "/serial-no",
        "/serial-number", 
        "/part-no",
        "/part-number",
        "/hardware-version",
        "/firmware-version",
        "/software-version",
        "/description",
        "/name",
        "/id",
        "/mfg-name",
        "/mfg-date",
        "/uuid",
        "/asset-id",
        "/clei-code",
    ]
    
    for pattern in high_card_patterns:
        if field_key.endswith(pattern):
            return True
    
    return False

# Check if a string value is low cardinality (shared)
def is_low_cardinality(val):
    val_upper = val.upper()
    
    # Boolean-like values
    if val_upper in ["TRUE", "FALSE"]:
        return True
    
    # Status values
    if val_upper in ["UP", "DOWN", "UNKNOWN", "TESTING", "DORMANT", "NOT_PRESENT", "LOWER_LAYER_DOWN"]:
        return True
    
    # Duplex mode
    if val_upper in ["FULL", "HALF", "AUTO"]:
        return True
    
    # FEC modes
    if val_upper.startswith("FEC_"):
        return True
    
    # Speed values
    if val_upper.startswith("SPEED_"):
        return True
    
    # Origin types
    if val_upper in ["STATIC", "DHCP", "LINK_LAYER", "RANDOM"]:
        return True
    
    # Mode values
    if val_upper in ["DISABLE", "REMOTE_ONLY", "ALL", "STRICT", "LOOSE"]:
        return True
    
    # Interface types
    if val_upper in ["ETHERNETCSMACD", "SOFTWARELOOPBACK", "L2VLAN", "PROPVIRTUAL", "OTHER"]:
        return True
    
    return False

# Check if a string value is low cardinality for components
def is_component_low_cardinality(val):
    val_upper = val.upper()
    
    # Oper status
    if val_upper in ["ACTIVE", "INACTIVE", "DISABLED", "STANDBY"]:
        return True
    
    # Admin state
    if val_upper in ["ENABLED", "DISABLED", "LOCKED", "UNLOCKED", "SHUTTINGDOWN"]:
        return True
    
    # Component types (after stripping prefix)
    component_types = [
        "CPU", "FAN", "POWER_SUPPLY", "CHASSIS", "LINECARD", "CONTROLLER",
        "BACKPLANE", "FABRIC", "STORAGE", "INTEGRATED_CIRCUIT", "FRU",
        "PORT", "TRANSCEIVER", "SENSOR", "MODULE", "OPERATING_SYSTEM",
        "SOFTWARE_MODULE", "OPENCONFIG_PLATFORM_TYPES"
    ]
    if val_upper in component_types:
        return True
    
    # Alarm severity
    if val_upper in ["CRITICAL", "MAJOR", "MINOR", "WARNING", "UNKNOWN"]:
        return True
    
    # Redundancy role
    if val_upper in ["PRIMARY", "SECONDARY", "MASTER", "SLAVE"]:
        return True
    
    return False

# Extract numeric value from measurement string (e.g., "31.6 celsius" -> 31.6)
# Returns the original value if no unit is found or conversion fails
def extract_numeric_value(val):
    val_str = str(val).strip()
    
    # Common measurement units to strip
    units = [
        "dbm", "dBm", "DBM",
        "ma", "mA", "MA", 
        "celsius", "Celsius", "CELSIUS",
        "volts", "Volts", "VOLTS", "v", "V",
        "watts", "Watts", "WATTS", "w", "W",
        "milliwatts", "mW", "mw",
        "amps", "Amps", "AMPS", "a", "A",
        "percent", "Percent", "PERCENT", "%",
        "hz", "Hz", "HZ", "khz", "kHz", "KHZ", "mhz", "MHz", "MHZ", "ghz", "GHz", "GHZ",
        "seconds", "sec", "s",
        "octets", "bytes", "kb", "KB", "mb", "MB", "gb", "GB",
    ]
    
    # Try to find and strip units
    for unit in units:
        if val_str.endswith(" " + unit):
            numeric_part = val_str[:-len(unit)-1].strip()
            # Try to convert to float
            if numeric_part.lstrip("-").replace(".", "", 1).isdigit():
                return float(numeric_part)
            return val
    
    # Check if the value has any space (could be "value unit" pattern)
    if " " in val_str:
        parts = val_str.split(" ", 1)
        numeric_part = parts[0].strip()
        # If first part is numeric, assume rest is unit
        if numeric_part.lstrip("-").replace(".", "", 1).isdigit():
            return float(numeric_part)
    
    return val

# Check if a value looks like a measurement with a unit
def is_measurement_with_unit(val):
    val_str = str(val).strip()
    if " " not in val_str:
        return False
    parts = val_str.split(" ", 1)
    numeric_part = parts[0].strip()
    return numeric_part.lstrip("-").replace(".", "", 1).isdigit()

# Convert field path to a clean tag name
def field_path_to_tag_name(field_path, data_type):
    # Check for nested structures
    if data_type == "interface" and "subinterface" in field_path:
        parts = field_path.split("/")
        last_part = parts[-1] if parts else field_path
        return "subif_" + last_part
    
    if data_type == "component" and "transceiver" in field_path:
        parts = field_path.split("/")
        last_part = parts[-1] if parts else field_path
        return "xcvr_" + last_part
    
    # For regular fields, just use the last part
    parts = field_path.split("/")
    return parts[-1] if parts else field_path

# Convert string numeric values to actual numbers
# This is critical for Prometheus output which only accepts numeric field values
# String fields are silently dropped by Prometheus output plugin
def convert_to_number(val):
    if val == None:
        return val
    
    # Already a number
    if type(val) == "int" or type(val) == "float":
        return val
    
    val_str = str(val).strip()
    
    # Empty string stays as-is
    if val_str == "":
        return val
    
    # Check if it's a pure integer (possibly negative)
    if val_str.lstrip("-").isdigit():
        return int(val_str)
    
    # Check if it's a float (possibly negative, one decimal point)
    if val_str.lstrip("-").replace(".", "", 1).isdigit():
        return float(val_str)
    
    # Not a number, return original
    return val
'''

# Filter out subinterfaces metrics as requested
[[processors.rename]]
  order = 3
  namepass = ["ribbon_interfaces"]
  fielddrop = ["subinterfaces*"]
