# #######################
# ## TO HELP WITH TROUBLESHOOTING AND DIAGNOSIS YOU CAN ALSO OUTPUT TO LOCAL 
# ## STORAGE USIBNG THE CONFIG BELOW. THE FOLLOWING OUTPUTS ARE NOT REQUIRED 
# ## FOR NORMAL OPERATION WITH PCA TELEMETRY COLLECTOR. YOU CAN LEAVE THEM
# ## COMMENTED OUT. (ETMARTEL)

[agent]
  interval = "60s"
  flush_interval = "50s"
  # debug = true
  quiet = false

[[outputs.file]]
  # Files to write to, "stdout" is a specially handled file.
  files = ["stdout"]
  data_format = "json"
  #data_format = "prometheus"
# #######################

[[inputs.cisco_telemetry_mdt]]
  ## Telemetry transport can be "tcp" or "grpc". TLS is only supported when
  ## using the grpc transport.
  transport = "grpc"

  ## Address and port to host telemetry listener
  service_address = ":57000"

  ## Grpc Maximum Message Size, default is 4MB, increase the size.
  max_msg_size = 104857600  # 100 MB in bytes

  ## Enable TLS; grpc transport only.
  # tls_cert = "/etc/telegraf/cert.pem"
  # tls_key = "/etc/telegraf/key.pem"

  ## Enable TLS client authentication and define allowed CA certificates; grpc
  ## transport only.
  # tls_allowed_cacerts = ["/etc/telegraf/clientca.pem"]

  ## Define aliases for measurements
  [inputs.cisco_telemetry_mdt.aliases]
    sys_intf = "sys/intf"
    sys_cpu = "sys/procsys/syscpusummary"
    sys_mem = "sys/procsys/sysmem"

# =============================================================
# PROCESSORS: Physical Interface Objects (nx_phys_if_stats)
# =============================================================

# Extract Interface ID from DN (Physical and SVI)
[[processors.regex]]
  order = 1
  namepass = ["sys_intf"]
  [[processors.regex.tags]]
    key = "interfaceEntity/l1PhysIf"
    pattern = "^phys-\\[(.*)\\]$"
    replacement = "${1}"
    result_key = "interface_id"
  [[processors.regex.tags]]
    key = "interfaceEntity/sviIf"
    pattern = "^svi-\\[(.*)\\]$"
    replacement = "${1}"
    result_key = "interface_id"

# Filter to only keep counter metrics (not config data)
[[processors.enum]]
  order = 2
  namepass = ["sys_intf"]
  
  # --- Physical Interface Mappings ---
  [[processors.enum.mapping]]
    tag = "interfaceEntity/l1PhysIf/rmonIfIn"
    dest = "counter_type"
    [processors.enum.mapping.value_mappings]
      dbgIfIn = "input"
  [[processors.enum.mapping]]
    tag = "interfaceEntity/l1PhysIf/rmonIfOut"
    dest = "counter_type"
    [processors.enum.mapping.value_mappings]
      dbgIfOut = "output"
  [[processors.enum.mapping]]
    tag = "interfaceEntity/l1PhysIf/rmonIfHCIn"
    dest = "counter_type"
    [processors.enum.mapping.value_mappings]
      dbgIfHCIn = "hc_input"
  [[processors.enum.mapping]]
    tag = "interfaceEntity/l1PhysIf/rmonIfHCOut"
    dest = "counter_type"
    [processors.enum.mapping.value_mappings]
      dbgIfHCOut = "hc_output"
  [[processors.enum.mapping]]
    tag = "interfaceEntity/l1PhysIf/rmonDot3Stats"
    dest = "counter_type"
    [processors.enum.mapping.value_mappings]
      dbgDot3Stats = "dot3"

  # --- SVI (VLAN) Mappings ---
  [[processors.enum.mapping]]
    tag = "interfaceEntity/sviIf/rmonIfIn"
    dest = "counter_type"
    [processors.enum.mapping.value_mappings]
      dbgIfIn = "input"
  [[processors.enum.mapping]]
    tag = "interfaceEntity/sviIf/rmonIfOut"
    dest = "counter_type"
    [processors.enum.mapping.value_mappings]
      dbgIfOut = "output"
  [[processors.enum.mapping]]
    tag = "interfaceEntity/sviIf/rmonIfHCIn"
    dest = "counter_type"
    [processors.enum.mapping.value_mappings]
      dbgIfHCIn = "hc_input"
  [[processors.enum.mapping]]
    tag = "interfaceEntity/sviIf/rmonIfHCOut"
    dest = "counter_type"
    [processors.enum.mapping.value_mappings]
      dbgIfHCOut = "hc_output"

# Filter only numerical counter fields
[[processors.converter]]
  order = 3
  namepass = ["sys_intf"]
  [processors.converter.fields]
    integer = [
      "octets", "ucastPkts", "multicastPkts", "broadcastPkts", "errors", "discards", 
      "TotalPkts", "nUcastPkts", "noBuffer", "unknownEtype", "unknownProtos", "qLen", 
      "octetRate", "packetRate", "alignmentErrors", "babble", "carrierSenseErrors", 
      "controlInUnknownOpcodes", "deferredTransmissions", "excessiveCollisions", 
      "fCSErrors", "frameTooLongs", "inPauseFrames", "inputdribble", 
      "internalMacReceiveErrors", "internalMacTransmitErrors", "lateCollisions", 
      "lostCarrierErrors", "multipleCollisionFrames", "noCarrierErrors", "outPauseFrames", 
      "runts", "sQETTestErrors", "singleCollisionFrames", "symbolErrors"
    ]

# Add Context Tags for Interfaces
[[processors.template]]
  order = 4
  namepass = ["sys_intf"]
  tag = "sessionId"
  template = '{{ .Tag "source" }}_{{ .Tag "interface_id" }}'

[[processors.template]]
  order = 5
  namepass = ["sys_intf"]
  tag = "sessionName"
  template = '{{ .Tag "source" }}_{{ .Tag "interface_id" }}'

[[processors.template]]
  order = 6
  namepass = ["sys_intf"]
  tag = "objectType"
  template = 'cisco-telemetry-nx-interface'

[[processors.template]]
  order = 7
  namepass = ["sys_intf"]
  tag = "direction"
  template = '0'

# Output Control for Interfaces
[[processors.tag_limit]]
  order = 8
  namepass = ["sys_intf"]
  fieldinclude = [
      "octets", "ucastPkts", "multicastPkts", "broadcastPkts", "errors", "discards", 
      "TotalPkts", "nUcastPkts", "noBuffer", "unknownEtype", "unknownProtos", "qLen", 
      "octetRate", "packetRate", "alignmentErrors", "babble", "carrierSenseErrors", 
      "controlInUnknownOpcodes", "deferredTransmissions", "excessiveCollisions", 
      "fCSErrors", "frameTooLongs", "inPauseFrames", "inputdribble", 
      "internalMacReceiveErrors", "internalMacTransmitErrors", "lateCollisions", 
      "lostCarrierErrors", "multipleCollisionFrames", "noCarrierErrors", "outPauseFrames", 
      "runts", "sQETTestErrors", "singleCollisionFrames", "symbolErrors", 
      "mtu", "bw", "speed", "adminSt", "delay",
      "bytesIn", "bytesOut", "packetsIn", "packetsOut", "multicastPacketsIn", 
      "multicastPacketsOut", "broadcastPacketsIn", "broadcastPacketsOut", 
      "totalPacketsIn", "totalPacketsOut", "errorsIn", "errorsOut", "discardsIn", "discardsOut"
  ]
  limit = 10
  keep = ["sessionId", "sessionName", "objectType", "direction", "interface_id", "counter_type"]

# =============================================================
# PROCESSORS: System Resources (sys_cpu, sys_mem)
# =============================================================

# Ensure integer types for CPU metrics
[[processors.converter]]
  order = 4
  namepass = ["sys_cpu"]
  [processors.converter.fields]
    integer = ["idle", "kernel", "user"]

# Add Context Tags for CPU
[[processors.template]]
  order = 5
  namepass = ["sys_cpu"]
  tag = "sessionId"
  template = '{{ .Tag "source" }}_cpu'

[[processors.template]]
  order = 6
  namepass = ["sys_cpu"]
  tag = "sessionName"
  template = '{{ .Tag "source" }}_cpu'

[[processors.template]]
  order = 7
  namepass = ["sys_cpu"]
  tag = "objectType"
  template = 'cisco-telemetry-nx-cpu'

[[processors.template]]
  order = 8
  namepass = ["sys_cpu"]
  tag = "direction"
  template = '-1'

# Output Control for CPU
[[processors.tag_limit]]
  order = 9
  namepass = ["sys_cpu"]
  fieldinclude = ["idle", "kernel", "user"]
  limit = 20
  keep = ["sessionId", "sessionName", "objectType", "direction"]

# Ensure integer types for Memory metrics
[[processors.converter]]
  order = 4
  namepass = ["sys_mem"]
  [processors.converter.fields]
    integer = ["buffers", "cached", "reserved", "total"]

# Add Context Tags for Memory
[[processors.template]]
  order = 5
  namepass = ["sys_mem"]
  tag = "sessionId"
  template = '{{ .Tag "source" }}_memory'

[[processors.template]]
  order = 6
  namepass = ["sys_mem"]
  tag = "sessionName"
  template = '{{ .Tag "source" }}_memory'

[[processors.template]]
  order = 7
  namepass = ["sys_mem"]
  tag = "objectType"
  template = 'cisco-telemetry-nx-memory'

[[processors.template]]
  order = 8
  namepass = ["sys_mem"]
  tag = "direction"
  template = '-1'

# Output Control for Memory
[[processors.tag_limit]]
  order = 9
  namepass = ["sys_mem"]
  fieldinclude = ["buffers", "cached", "reserved", "total"]
  limit = 20
  keep = ["sessionId", "sessionName", "objectType", "direction"]

# =============================================================
# AGGREGATION: Unify Interface Metrics
# =============================================================

# Normalize field names and prepare for merging
[[processors.starlark]]
  order = 20
  namepass = ["sys_intf"]
  source = '''
def apply(metric):
    # Safety check: Ensure we operate on interfaces we've identified/processed
    # This prevents merging SVIs or other interfaces where interface_id logic didn't match
    if "interface_id" not in metric.tags:
        return metric
        
    # Sanitize tags to ensure aggregation works.
    # We strip the specific path tags (like interfaceEntity/l1PhysIf/rmonIfIn) 
    # that vary between chunks, keeping only the session context.
    keep_tags = {
        "source": True, 
        "interface_id": True, 
        "sessionId": True, 
        "sessionName": True, 
        "objectType": True, 
        "direction": True, 
        "sys/intf": True, 
        "subscription": True,
        "counter_type": True
    }
    
    # Identify tags to remove
    to_remove = []
    for t in metric.tags:
        if t not in keep_tags:
            to_remove.append(t)
            
    # Remove them
    for t in to_remove:
        metric.tags.pop(t)

    # Only process renaming if counter_type exists
    ct = metric.tags.get("counter_type")
    # If no counter_type, we still return the sanitized metric (ready for merge)
    if not ct:
        return metric
        
    iid = metric.tags.get("interface_id", "")
    # Check if this interface lacks HC counters (e.g. VLANs start with vlan, Loopbacks might be similar)
    # If so, we MUST NOT drop the standard 'duplicates' from "input"/"output"
    no_hc_support = iid.startswith("vlan")
    
    # 1. Prefer HC counters: Remove overlapping fields from non-HC metrics
    duplicates = ["octets", "ucastPkts", "multicastPkts", "broadcastPkts", "TotalPkts"]
    
    # Map raw names to user-friendly names requested
    name_map = {
        "octets": "bytes",
        "ucastPkts": "packets",
        "multicastPkts": "multicastPackets",
        "broadcastPkts": "broadcastPackets",
        "TotalPkts": "totalPackets"
    }

    # 2. Suffix fields based on direction
    new_fields = {}
    
    suffix = ""
    is_hc = False
    
    if ct == "input":
        suffix = "In"
    elif ct == "output":
        suffix = "Out"
    elif ct == "hc_input":
        suffix = "In"
        is_hc = True
    elif ct == "hc_output":
        suffix = "Out"
        is_hc = True
        
    for k, v in metric.fields.items():
        should_keep = True
        # If it's a field that exists in both HC and Standard:
        if k in duplicates:
            # If we have HC support (Physical/Mgmt) AND this is a Standard chunk:
            # We DROP it (because the HC chunk will provide it)
            if not no_hc_support and not is_hc:
                 should_keep = False
        
        if should_keep:
            base_name = name_map.get(k, k)
            new_fields[base_name + suffix] = v
            
    metric.fields.clear()
    metric.fields.update(new_fields)

    # 3. Remove the tag so all chunks for the same session merge into one
    metric.tags.pop("counter_type")
    
    return metric
'''

# Merge the modified chunks into single metrics
[[aggregators.merge]]
  namepass = ["sys_intf"]
  drop_original = true
