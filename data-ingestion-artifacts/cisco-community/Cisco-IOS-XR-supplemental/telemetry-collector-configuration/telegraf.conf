[[processors.starlark]]
  order = 7
  namepass = ["power_management*"]
  source = '''
def apply(metric):
    # List of suffixes to process: in_a, in_b, and out
    suffixes = ["in_a", "in_b", "out"]
    
    for s in suffixes:
        v_field = "mvoltage_" + s
        c_field = "mcurrent_" + s
        mw_field = "mwatts_" + s
        w_field = "watts_" + s
        
        # Get the milli-values from the metric
        v = metric.fields.get(v_field)
        c = metric.fields.get(c_field)
        
        # Only perform math if both fields exist
        if v != None and c != None:
            # 1. Calculate milli-watts (milli-volts * milli-amps / 1000)
            # Note: mV * mA = microwatts. To get milliwatts, we divide by 1000.
            mwatts = (v * c) / 1000.0
            metric.fields[mw_field] = str(mwatts)
            
            # 2. Calculate standard Watts (milliwatts / 1000)
            metric.fields[w_field] = str(mwatts / 1000.0)
            
    return metric
'''

