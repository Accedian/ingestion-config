[agent]
  interval = "60s"
  flush_interval = "50s"
  debug = true
  quiet = false

[[outputs.file]]
  # Files to write to, "stdout" is a specially handled file.
  files = ["stdout"]
  data_format = "json"
  #data_format = "prometheus"
#######################

[[inputs.cisco_telemetry_mdt]]
 ## Telemetry transport can be "tcp" or "grpc".  TLS is only supported when
 ## using the grpc transport.
 transport = "tcp"

 ## Address and port to host telemetry listener
 service_address = ":57000"

 ## Grpc Maximum Message Size, default is 4MB, increase the size.
 max_msg_size = 104857600  # 100 MB in bytes

 ## Enable TLS; grpc transport only.
 # tls_cert = "/etc/telegraf/cert.pem"
 # tls_key = "/etc/telegraf/key.pem"

 ## Enable TLS client authentication and define allowed CA certificates; grpc
 ##  transport only.
 # tls_allowed_cacerts = ["/etc/telegraf/clientca.pem"]

 embedded_tags = ["Cisco-IOS-XR-envmon-oper:power-management/rack/producers/producer-nodes/producer-node/pem-info-array/node-name",
                  "Cisco-IOS-XR-envmon-oper:power-management/rack/producers/producer-nodes/producer-node/pem-info-array/node-status",
                  "Cisco-IOS-XR-envmon-oper:power-management/rack/producers/producer-nodes/producer-node/pem-info-array/node-type"]


 ## Define aliases to map telemetry encoding paths to simple measurement names
