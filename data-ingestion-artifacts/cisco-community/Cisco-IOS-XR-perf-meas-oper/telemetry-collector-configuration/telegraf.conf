# Useful for manual debugging
# [[outputs.file]]
#   files = ["stdout"]
#   data_format = "json"

[[inputs.cisco_telemetry_mdt]]
 ## Telemetry transport can be "tcp" or "grpc".  TLS is only supported when
 ## using the grpc transport.
 transport = "tcp"

 ## Address and port to host telemetry listener
 service_address = ":57000"

 ## Grpc Maximum Message Size, default is 4MB, increase the size.
 max_msg_size = 20000000

 ## Enable TLS; grpc transport only.
 # tls_cert = "/etc/telegraf/cert.pem"
 # tls_key = "/etc/telegraf/key.pem"

 ## Enable TLS client authentication and define allowed CA certificates; grpc
 ##  transport only.
 # tls_allowed_cacerts = ["/etc/telegraf/clientca.pem"]

 ## Define (for certain nested telemetry measurements with embedded tags) which fields are tags
 embedded_tags = ["session_id","timestamp_format", "timestamp_source" ]
 ## Define aliases to map telemetry encoding paths to simple measurement names
 [inputs.cisco_telemetry_mdt.aliases]
     #sr_pm_last_adv = "Cisco-IOS-XR-perf-meas-oper:performance-measurement/nodes/node/interfaces/interface-delay/interface-last-advertisements/interface-last-advertisement"
     sr_pm_last_agg = "Cisco-IOS-XR-perf-meas-oper:performance-measurement/nodes/node/interfaces/interface-delay/interface-last-aggregations/interface-last-aggregation"
     #sr_pm_policy = "Cisco-IOS-XR-perf-meas-oper:performance-measurement/nodes/node/sr-policies/sr-policy-details/sr-policy-detail"

[[processors.starlark]]
  order = 1
  namepass = ["sr_pm_last_agg*"]
source = '''
def apply(metric):
    if metric.fields.get("last_aggregation/aggregated_probe_values/number_of_packets_sent") == 0:
        return None
    else:
        return metric
'''


[[processors.regex]]
  namepass = ["sr_pm_last_agg*"]
  order = 2
  [[processors.regex.field_rename]]
    pattern = "^last_aggregation/(.*)"
    replacement = "${1}"
  [[processors.regex.field_rename]]
    pattern = "^aggregated_probe_values/(.*)"
    replacement = "delay_${1}"

[[processors.strings]]
  order = 3
  [[processors.strings.replace]]
    tag = "node_name"   # The specific tag key to apply this replacement to
    old = "/"       # The string to find (the comma)
    new = "_"    # The string to replace with (the underscore)
  [[processors.strings.replace]]
    tag = "node"   # The specific tag key to apply this replacement to
    old = "/"       # The string to find (the comma)
    new = "_"    # The string to replace with (the underscore)

[[processors.enum]]
  order = 4
  [[processors.enum.mapping]]
    field = "delay_a_flag_set"
    dest = "delay_a_flag_set"
    [processors.enum.mapping.value_mappings]
      true = 1
      false = 0
  [[processors.enum.mapping]]
    field = "loss_a_flag_set"
    dest = "loss_a_flag_set"
    [processors.enum.mapping.value_mappings]
      true = 1
      false = 0

[[processors.converter]]
  order = 5
  [processors.converter.fields]
    tag = ["session_id", 
           "timestamp_format", 
           "timestamp_source"]
    timestamp = ["aggregation_timestamp"]
    timestamp_format = "unix_ms"



