# direction applies to all measurements, so we can set it in a single pass without namepass
[[processors.template]]
  order = 12
  tag = "direction"
  template = "2"  

# Template Section for specifying Fields to output from processor layer and tags for interface objects
[[processors.tag_limit]]
order = 13
  namepass = ["sr_pm_last_agg*"]
  fieldinclude = [
    "delay_average",
    "delay_minimum",
    "delay_maximum",
    "delay_variance",
    "number_of_packets_sent",
    "number_of_packets_received",
  ]
  ## Maximum number of tags to preserve
  limit = 12

  ## List of tags to preferentially preserve
  keep = ["sessionId", "sessionName", "objectType", "direction"]


