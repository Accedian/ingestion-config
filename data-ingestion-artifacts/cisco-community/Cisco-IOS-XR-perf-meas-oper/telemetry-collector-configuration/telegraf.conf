## Represents the raw performance data collected from probes over a specific interval
## This tells you what is actually happening on the link right now.
## if you only care about monitoring link latency and loss for graphing/ dashboards
## i.e.: What is the network feeling?

[[processors.template]]
  order = 6
  namepass = ["sr_pm_last_agg*"]
  tag = "sessionName"
  template = '{{ .Tag "source" }}_{{ .Tag "interface_name" }}_sr_pm_last_agg'
[[processors.template]]
  order = 7
  namepass = ["sr_pm_last_agg*"]
  tag = "sessionId"
  template = '{{ .Tag "source" }}_{{ .Tag "interface_name" }}_sr_pm_last_agg'
[[processors.template]]
  order = 8
  namepass = ["sr_pm_last_agg*"]
  tag = "objectType"
  template = "cisco_mdt_sr_pm_last_agg"  


