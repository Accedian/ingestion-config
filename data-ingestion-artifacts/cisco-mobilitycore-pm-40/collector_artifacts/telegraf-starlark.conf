[[inputs.kafka_consumer]]
  interval = "60s"
  brokers = ["{{server_ip}}:9092"]
  kafka_version = "3.9.0"
  topics = ["pca_kpi_topic"]
  offset = "oldest"
  max_message_len = 1000000
  data_format = "json"
  json_query = "@this"
  json_name_key = "kpi"
  json_time_key = "timestamp"
  json_time_format = "unix"
  tag_keys = ["device", "kpi","index","node_id","schema", "source_ip", "node_ip", "node_type"]
  ## IMPORTANT: Only parse "value" field as metric data.
  ## This prevents extra JSON fields (e.g. counters, metadata) from becoming
  ## phantom KPIs with value 0. Without this, any numeric field in the JSON
  ## that is not in tag_keys would create a new metric named "<kpi>_<field>".
  fieldpass = ["value"]

#######################
# INTERNAL METRICS HANDLER
#
# Adds required tags to Telegraf internal metrics (internal_*)
# These are used for agent health monitoring.
#######################
[[processors.starlark]]
  order = 2
  namepass = ["internal_*"]
  
  source = '''
def apply(metric):
    metric.tags["objectType"] = "internal"
    metric.tags["sessionId"] = "internal"
    metric.tags["sessionName"] = "internal"
    metric.tags["direction"] = "-1"
    return metric
'''

# Processor: Clean "index" tag - remove square brackets
[[processors.regex]]
  order = 3
  namedrop = ["internal_*"]
  [[processors.regex.tags]]
    key = "index"
    pattern = '^\["(.*?)"\]$'
    replacement = '${1}'

# Processor: Clean "index" tag - replace commas with underscores
[[processors.strings]]
  order = 4
  [[processors.strings.replace]]
    tag = "index"
    old = ","
    new = "_"

