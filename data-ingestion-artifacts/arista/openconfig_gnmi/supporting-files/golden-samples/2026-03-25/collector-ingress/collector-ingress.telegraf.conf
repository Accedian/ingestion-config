[agent]
  interval = "60s"
  flush_interval = "50s"
  # debug = true
  quiet = false

[[inputs.gnmi]]
  ## Address and port of the Arista switch
  addresses = ["192.168.20.135:6030"] # Replace with your Switch IP

  ## Credentials
  username = "__DEVICE_USERNAME__"
  password = "__DEVICE_PASSWORD__"

  ## Encoding: "proto" is the most efficient for Arista EOS
  encoding = "proto"
  
  ## Redial settings in case of connection loss
  redial = "10s"
  
  ## TLS Configuration
  ## For insecure connections (no TLS), skip certificate verification
  ## If your switch uses TLS, set insecure_skip_verify = true for self-signed certs
  ## or provide tls_ca, tls_cert, tls_key for proper verification
  insecure_skip_verify = true 

  ## --- SUBSCRIPTIONS ---

  ## 1. Interface Statistics (Traffic, Errors, Discards)
  [[inputs.gnmi.subscription]]
    name = "if_counters"
    origin = "openconfig"
    path = "/interfaces/interface/state/counters"
    subscription_mode = "sample"
    sample_interval = "10s"

  ## 2. System Health: CPU and Memory (Arista uses /system)
  [[inputs.gnmi.subscription]]
    name = "system_health"
    origin = "openconfig"
    path = "/system/state"
    subscription_mode = "sample"
    sample_interval = "30s"

  ## 3. Hardware Components (PSUs, Fans, Temps, Transceivers)
  [[inputs.gnmi.subscription]]
    name = "components"
    origin = "openconfig"
    path = "/components/component"
    subscription_mode = "sample"
    sample_interval = "60s"

  ## 4. Network Instances (VRFs, routing tables)
  [[inputs.gnmi.subscription]]
    name = "network_instances"
    origin = "openconfig"
    path = "/network-instances/network-instance/state"
    subscription_mode = "sample"
    sample_interval = "60s"

[[outputs.file]]
  files = ["/capture/collector-ingress.jsonl"]
  data_format = "json"
