# Lab-reference artifact preserved from rapid EANTC interop work.
[agent]
  interval = "60s"
  flush_interval = "50s"
  # debug = true
  quiet = false

[[outputs.file]]
  files = ["stdout"]
  data_format = "json"

## Processor to filter and transform metrics
## - CPU: keep only avg, max, min fields
## - PowerSupply: keep only input_current, input_voltage, output_voltage, output_current
## - TempSensor: keep only max field, rename to SensorName_max
## - For TempSensor: use sessionId/sessionName = source_TemperatureSensor (merged)
## - Override timestamps to current time so merge aggregator works
[[processors.starlark]]
  source = '''
load("time.star", "time")

def apply(metric):
    # Override timestamp to current time so merge aggregator can work
    metric.time = time.now().unix_nano
    
    # Get source and name from existing tags
    source = metric.tags.get("source", "unknown")
    name = metric.tags.get("name", "unknown")
    
    # Drop system_health metrics entirely
    if metric.name == "system_health":
        return None
    
    # For components, only keep TempSensor, CPU, and PowerSupply (exact matches)
    if metric.name == "components":
        # Check if name matches allowed prefixes exactly
        is_temp_sensor = name.startswith("TempSensor")
        is_cpu = name.startswith("CPU") and not name.startswith("CpuComplex")
        is_power = name == "PowerSupply1" or name == "PowerSupply2"
        
        if not (is_temp_sensor or is_cpu or is_power):
            return None
        
        # Define allowed fields per component type
        if is_cpu:
            allowed_fields = ["avg", "max", "min"]
            session_value = source + "_" + name
        elif is_power:
            allowed_fields = ["input_current", "input_voltage", "output_voltage", "output_current"]
            session_value = source + "_" + name
        elif is_temp_sensor:
            allowed_fields = ["max"]
            # For TempSensor: use unified session name
            session_value = source + "_TemperatureSensor"
        
        # Filter fields - keep only allowed ones
        keys_to_remove = []
        keys_to_rename = []
        
        for key in list(metric.fields.keys()):
            value = metric.fields[key]
            t = type(value)
            
            # Remove string fields
            if t == "str" or t == "string":
                keys_to_remove.append(key)
                continue
            
            # Handle fields with path prefix
            short_key = key
            if "/" in key:
                idx = key.rfind("/")
                short_key = key[idx+1:]
            
            # Check if field is allowed
            if short_key not in allowed_fields:
                keys_to_remove.append(key)
            elif is_temp_sensor and short_key == "max":
                # For TempSensor, rename max to SensorName_max
                keys_to_rename.append((key, name + "_max"))
            elif "/" in key:
                # Rename to remove path prefix
                keys_to_rename.append((key, short_key))
        
        # Remove unwanted fields
        for key in keys_to_remove:
            if key in metric.fields:
                metric.fields.pop(key)
        
        # Rename fields
        for old_key, new_key in keys_to_rename:
            if old_key in metric.fields:
                value = metric.fields.pop(old_key)
                metric.fields[new_key] = value
        
        # Set session tags
        metric.tags["sessionId"] = session_value
        metric.tags["sessionName"] = session_value
        metric.tags["objectType"] = "arista_" + metric.name
        metric.tags["direction"] = "0"
        
        # For TempSensor, update name tag to unified name
        if is_temp_sensor:
            metric.tags["name"] = "TemperatureSensor"
    
    else:
        # For if_counters - keep as before
        session_value = source + "_" + name
        metric.tags["sessionId"] = session_value
        metric.tags["sessionName"] = session_value
        metric.tags["objectType"] = "arista_" + metric.name
        metric.tags["direction"] = "0"
        
        # Remove unwanted fields
        always_remove = ["last_update", "carrier_transitions"]
        keys_to_remove = []
        keys_to_rename = []
        
        for key in list(metric.fields.keys()):
            value = metric.fields[key]
            t = type(value)
            if t == "str" or t == "string":
                keys_to_remove.append(key)
            elif key in always_remove:
                keys_to_remove.append(key)
            elif "/" in key:
                idx = key.rfind("/")
                short_key = key[idx+1:]
                if short_key in always_remove:
                    keys_to_remove.append(key)
                else:
                    keys_to_rename.append((key, short_key))
        
        for key in keys_to_remove:
            if key in metric.fields:
                metric.fields.pop(key)
        
        for old_key, new_key in keys_to_rename:
            if old_key in metric.fields:
                value = metric.fields.pop(old_key)
                metric.fields[new_key] = value
    
    # Remove path and other varying tags
    for tag_to_remove in ["path", "/components/component/properties/property/name", "index", "severity"]:
        if tag_to_remove in metric.tags:
            metric.tags.pop(tag_to_remove)
    
    # Check if any fields remain
    has_fields = False
    for key in metric.fields.keys():
        has_fields = True
        break
    
    if not has_fields:
        return None
    

    # -------------------------------------------------------------------
    # Add trailer to sessionId and sessionName
    # -------------------------------------------------------------------
    before_trailer = metric.tags.get("sessionName")
    with_trailer = before_trailer + "_arista"
    metric.tags["sessionName"] = with_trailer
    metric.tags["sessionId"] = with_trailer

    return metric
'''

## Merge aggregator to combine TempSensor metrics into single metric
[[aggregators.merge]]
  drop_original = true
  period = "60s"
  grace = "30s"

[[inputs.gnmi]]
  ## Address and port of the Arista switch
  addresses = ["192.168.20.135:6030"] # Replace with your Switch IP

  ## Credentials
  username = "__DEVICE_USERNAME__"
  password = "__DEVICE_PASSWORD__"

  ## Encoding: "proto" is the most efficient for Arista EOS
  encoding = "proto"
  
  ## Redial settings in case of connection loss
  redial = "10s"
  
  ## TLS Configuration
  ## For insecure connections (no TLS), skip certificate verification
  ## If your switch uses TLS, set insecure_skip_verify = true for self-signed certs
  ## or provide tls_ca, tls_cert, tls_key for proper verification
  insecure_skip_verify = true 

  ## --- SUBSCRIPTIONS ---

  ## 1. Interface Statistics (Traffic, Errors, Discards)
  [[inputs.gnmi.subscription]]
    name = "if_counters"
    origin = "openconfig"
    path = "/interfaces/interface/state/counters"
    subscription_mode = "sample"
    sample_interval = "10s"

  ## 2. System Health: CPU and Memory (Arista uses /system)
  [[inputs.gnmi.subscription]]
    name = "system_health"
    origin = "openconfig"
    path = "/system/state"
    subscription_mode = "sample"
    sample_interval = "30s"

  ## 3. Hardware Components (PSUs, Fans, Temps, Transceivers)
  [[inputs.gnmi.subscription]]
    name = "components"
    origin = "openconfig"
    path = "/components/component"
    subscription_mode = "sample"
    sample_interval = "60s"

  ## 4. Network Instances (VRFs, routing tables)
  [[inputs.gnmi.subscription]]
    name = "network_instances"
    origin = "openconfig"
    path = "/network-instances/network-instance/state"
    subscription_mode = "sample"
    sample_interval = "60s"
