# Template Section for constructing object ID for  SLM/DMM metrics
[[processors.template]]
  namepass = ["sla_stats*"]
  tag = "sessionName"
  template = '{{ .Tag "source" }}_{{ .Tag "interface_name" }}_{{ .Tag "domain_name" }}_{{ .Tag "profile_name" }}_{{ .Tag "mep_id" }}'

[[processors.template]]
  namepass = ["sla_stats*"]
  tag = "sessionId"
  template = '{{ .Tag "source" }}_{{ .Tag "interface_name" }}_{{ .Tag "domain_name" }}_{{ .Tag "profile_name" }}_{{ .Tag "mep_id" }}'


[[processors.template]]
  namepass = ["sla_stats*"]
  tag = "direction"
  template = '-1'

[[processors.starlark]]
  namepass = ["sla_stats*"]

source = '''
def apply(metric):
    if metric.fields.get("probe_type") == "cfm-synthetic-loss-measurement":
        metric.tags["objectType"] = "cisco-telemetry-xr-slm"
        sd_frames_lost = metric.fields.get("metric-one-way-flr-sd/operation_metric/bucket/contents/unaggregated/sample/frames_lost")
        sd_frames_sent = metric.fields.get("metric-one-way-flr-sd/operation_metric/bucket/contents/unaggregated/sample/frames_sent")
        ds_frames_lost = metric.fields.get("metric-one-way-flr-ds/operation_metric/bucket/contents/unaggregated/sample/frames_lost")
        ds_frames_sent = metric.fields.get("metric-one-way-flr-ds/operation_metric/bucket/contents/unaggregated/sample/frames_sent")
        if type(sd_frames_lost) == "int" and type(sd_frames_sent) == "int" and type(ds_frames_lost) == "int" and type(ds_frames_sent) == "int":
            availabilityPct = max([(100 * (sd_frames_lost / sd_frames_sent)), (100 * (ds_frames_lost / ds_frames_sent))])
            if availabilityPct <= 0.5:
                metric.fields["availabilityPct"] = 100
            else:
                metric.fields["availabilityPct"] = 0
        else:
            metric.fields["availabilityPct"] = 0
    if metric.fields.get("probe_type") == "cfm-delay-measurement":
        metric.tags["objectType"] = "cisco-telemetry-xr-dmm"
        sd_jitter_avg = metric.fields.get("metric-one-way-jitter-sd/operation_metric/bucket/average")
        ds_jitter_avg = metric.fields.get("metric-one-way-jitter-ds/operation_metric/bucket/average")
        if sd_jitter_avg and ds_jitter_avg:
            metric.fields["delay_var_avg_rt"] = (sd_jitter_avg + ds_jitter_avg) / 2

    return metric
'''

# Template Section for specifying Fields to output from processor layer and tags for SLM objects
[[processors.tag_limit]]
  namepass = ["sla_stats*"]
  fieldinclude = [
    "metric-one-way-flr-ds/operation_metric/bucket/contents/unaggregated/sample/frames_lost",
    "metric-one-way-flr-ds/operation_metric/bucket/contents/unaggregated/sample/frames_sent",
    "metric-one-way-flr-sd/operation_metric/bucket/contents/unaggregated/sample/frames_lost",
    "metric-one-way-flr-sd/operation_metric/bucket/contents/unaggregated/sample/frames_sent",
    "metric-one-way-flr-ds/operation_metric/bucket/standard_deviation",
    "metric-one-way-flr-sd/operation_metric/bucket/standard_deviation",
    "availability_percent",
    "metric-round-trip-delay/operation_metric/bucket/maximum",
    "metric-round-trip-delay/operation_metric/bucket/minimum",
    "metric-round-trip-delay/operation_metric/bucket/average",
    "metric-round-trip-delay/operation_metric/bucket/standard_deviation",
    "metric-one-way-jitter-sd/operation_metric/bucket/minimum",
    "metric-one-way-jitter-sd/operation_metric/bucket/maximum",
    "metric-one-way-jitter-sd/operation_metric/bucket/average",
    "metric-one-way-jitter-sd/operation_metric/bucket/standard_deviation",
    "metric-one-way-jitter-ds/operation_metric/bucket/maximum",
    "metric-one-way-jitter-ds/operation_metric/bucket/minimum",
    "metric-one-way-jitter-ds/operation_metric/bucket/average",
    "metric-one-way-jitter-ds/operation_metric/bucket/standard_deviation",
    "delay_var_avg_rt"
  ]
  ## Maximum number of tags to preserve
  limit = 4

  ## List of tags to preferentially preserve
  keep = ["sessionId", "sessionName", "objectType","direction"]
