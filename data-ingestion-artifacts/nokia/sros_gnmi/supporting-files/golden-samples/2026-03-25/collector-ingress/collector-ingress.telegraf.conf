[agent]
  interval = "60s"
  flush_interval = "50s"
  debug = true
  quiet = false

[[inputs.gnmi]]
  ## Address and port of the gNMI GRPC server
  addresses = ["192.168.20.33:57400"]
  
  ## Credentials
  username = "pcc"
  password = "Nokia_1234"
  
  ## gNMI encoding (json_ietf is recommended for Nokia)
  encoding = "json_ietf"
  
  ## Connection settings
  redial = "10s"
  insecure_skip_verify = true  # Matches your --insecure flag

  ## ---------------------------------------------------------
  ## Subscription 1: Interface/Port Counters (Native Path)
  ## ---------------------------------------------------------
  [[inputs.gnmi.subscription]]
    name = "nokia_port_stats"
    origin = "nokia"
    path = "/state/port/statistics"
    subscription_mode = "sample"
    sample_interval = "10s"

  ## ---------------------------------------------------------
  ## Subscription 2: CPU Utilization (Native Path)
  ## ---------------------------------------------------------
  [[inputs.gnmi.subscription]]
    name = "nokia_system_cpu"
    origin = "nokia"
    path = "/state/system/cpu"
    subscription_mode = "sample"
    sample_interval = "30s"

## ---------------------------------------------------------
## Processor: Add custom tags using Starlark
## ---------------------------------------------------------

[[outputs.file]]
  files = ["/capture/collector-ingress.jsonl"]
  data_format = "json"
