[agent]
  interval = "60s"
  flush_interval = "50s"
  # debug = true
  quiet = false

[[outputs.file]]
  files = ["stdout"]
  data_format = "json"

# gNMI telemetry input plugin
[[inputs.gnmi]]
  ## Address and port of the gNMI GRPC server
  addresses = ["192.168.20.33:57400"]
  
  ## Credentials
  username = "__DEVICE_USERNAME__"
  password = "__DEVICE_PASSWORD__"
  
  ## gNMI encoding (json_ietf is recommended for Nokia)
  encoding = "json_ietf"
  
  ## Connection settings
  redial = "10s"
  insecure_skip_verify = true  # Matches your --insecure flag

  ## ---------------------------------------------------------
  ## Subscription 1: Interface/Port Counters (Native Path)
  ## ---------------------------------------------------------
  [[inputs.gnmi.subscription]]
    name = "nokia_port_stats"
    origin = "nokia"
    path = "/state/port/statistics"
    subscription_mode = "sample"
    sample_interval = "10s"

  ## ---------------------------------------------------------
  ## Subscription 2: CPU Utilization (Native Path)
  ## ---------------------------------------------------------
  [[inputs.gnmi.subscription]]
    name = "nokia_system_cpu"
    origin = "nokia"
    path = "/state/system/cpu"
    subscription_mode = "sample"
    sample_interval = "30s"

## ---------------------------------------------------------
## Processor: Add custom tags using Starlark
## ---------------------------------------------------------
[[processors.starlark]]
  source = '''
def apply(metric):
    # Get the measurement name (subscription name)
    name = metric.name
    
    # Get path and other tags
    path = metric.tags.get("path", "")
    host = metric.tags.get("host", "")
    port_id = metric.tags.get("port_id", "")
    sample_period = metric.tags.get("sample_period", "")
    
    # Filter out egress-queue metrics - only keep base port statistics
    if "egress-queue" in path:
        return None
    
    # Filter CPU metrics - only keep summary/usage, summary/total, summary/idle with sample_period=60
    if "/state/system/cpu" in path:
        allowed_cpu_paths = [
            "/state/system/cpu/summary/usage",
            "/state/system/cpu/summary/total",
            "/state/system/cpu/summary/idle"
        ]
        if path not in allowed_cpu_paths:
            return None
        # Only keep sample_period = "60"
        if sample_period != "60":
            return None
    
    # Build session prefix for port statistics paths
    if "/state/port/statistics" in path and host and port_id:
        # Replace "/" with "_" in port_id for sessionId/sessionName
        port_id_clean = port_id.replace("/", "_")
        session_prefix = host + "_" + port_id_clean + "_"
        metric.tags["sessionId"] = session_prefix + name
        metric.tags["sessionName"] = session_prefix + name
    elif "/state/system/cpu" in path:
        # For CPU metrics, append last part of path to sessionId/sessionName
        # e.g., /state/system/cpu/summary/usage -> usage
        path_parts = path.split("/")
        last_part = path_parts[-1] if path_parts else ""
        metric.tags["sessionId"] = name + "_" + last_part
        metric.tags["sessionName"] = name + "_" + last_part
    else:
        metric.tags["sessionId"] = name
        metric.tags["sessionName"] = name
    
    # Set other tags
    metric.tags["objectType"] = name
    metric.tags["direction"] = "0"
    
    # Replace "/" with "_" in metric name
    metric.name = name.replace("/", "_")
    
    # Replace "/" with "_" in all field names
    new_fields = {}
    for key, value in metric.fields.items():
        new_key = key.replace("/", "_")
        new_fields[new_key] = value
    
    # Clear and set new fields
    for key in list(metric.fields.keys()):
        metric.fields.pop(key)
    for key, value in new_fields.items():
        metric.fields[key] = value
    
    # Replace "/" with "_" in all tag values
    for key in list(metric.tags.keys()):
        value = metric.tags[key]
        if "/" in value:
            metric.tags[key] = value.replace("/", "_")
    
    # Remove leading "_" from path tag
    if metric.tags.get("path", "").startswith("_"):
        metric.tags["path"] = metric.tags["path"][1:]
    
    return metric
'''

## ---------------------------------------------------------
## Processor: Replace "/" with "_" in metric names
## ---------------------------------------------------------
[[processors.regex]]
  [[processors.regex.metric_rename]]
    pattern = "/"
    replacement = "_"
